  json.dump(stats, fh, indent=2)

# KEY=VALUE lines -> $OUTPUTS. good_fit i