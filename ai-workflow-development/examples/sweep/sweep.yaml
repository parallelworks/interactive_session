  w1:
    needs:
      - prepare
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Sweep band 1
        run: |
          set -x
          cd ${PW_PARENT_JOB_DIR}
          python3 sweep/minimize.py --id 1 --lo -6 --hi -2 --steps "${{ inputs.sweep.steps }}"

  w2:
    needs:
      - prepare
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Sweep band 2
        run: |
          set -x
          cd ${PW_PARENT_JOB_DIR}
          python3 sweep/minimize.py --id 2 --lo -2 --hi 2 --steps "${{ inputs.sweep.steps }}"

  w3:
    needs:
      - prepare
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Sweep band 3
        run: |
          set -x
          cd ${PW_PARENT_JOB_DIR}
          python3 sweep/minimize.py --id 3 --lo 2 --hi 6 --steps "${{ inputs.sweep.steps }}"

  aggregate:
    needs:
      - w1
      - w2
      - w3
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Merge results
        run: |
          set -x
          cd ${PW_PARENT_JOB_DIR}
          ls -la part_*.json
          python3 sweep/aggregate.py | tee -a $OUTPUTS
          echo "--- sweep_result.json ---"
          cat sweep_result.json

'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: Compute resource
        include-workspace: true
      sweep:
        type: group
        label: Sweep Settings
        items:
          steps:
            label: Grid steps per band (per axis)
            type: integer
            default: 240
