permissions:
  - '*'

sessions:
  fractal:
    redirect: true

env:
  RESOLUTION: ${{ inputs.resolution }}

jobs:
  install:
    working-directory: ${{ inputs.rundir }}
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Checkout Fractal Demo
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: tutorial
          sparse_checkout:
            - workflow/tutorials/hsp/fractal-demo
      - name: Install Dependencies
        run: |
          set -x
          # Stage the demo at the run-wide rundir so the run script written by
          # the parent (which references ${{ inputs.rundir }}/fractal-demo) finds
          # it, on this resource, regardless of where checkout cloned.
          rm -rf "${{ inputs.rundir }}/fractal-demo"
          mv workflow/tutorials/hsp/fractal-demo "${{ inputs.rundir }}/fractal-demo"
          rm -rf workflow
          "${{ inputs.rundir }}/fractal-demo/install.sh"

  autocancel:
    needs:
      - install
    steps:
      - name: Wait for Cancel Signal
        retry:
          max-retries: 8640
          interval: 10s
        run: |
          # Exit non-zero until the parent job drops the CANCEL file, so the retry above keeps polling
          if [ ! -f ${PW_PARENT_JOB_DIR}/CANCEL ]; then
            echo "$(date) CANCEL file not present yet"
            exit 1
          fi
          echo "::notice:: CANCEL file found on ${{ inputs.resource.ip }} — canceling the script_submitter and session jobs"


      - name: Cancel Jobs
        uses: parallelworks/cancel-jobs
        with:
          jobs:
            - script_submitter
            - session

  script_submitter:
    needs:
      - install
    steps:
      - name: Script Submitter
        uses: github/parallelworks/interactive_session@main
        with:
          $yaml: workflow/script_submitter/v3.6/hsp.yaml
          resource: ${{ inputs.resource }}
          shebang: '#!/bin/bash'
          use_existing_script: true
          script_path: ${{ inputs.script_path }}
          scheduler: ${{ inputs.scheduler }}
          use_scheduler_agent: false
          slurm:
            is_enabled: ${{ inputs.slurm.is_enabled }}
            account: ${{ inputs.slurm.account }}
            partition: ${{ inputs.slurm.partition }}
            qos: ${{ inputs.slurm.qos }}
            cpus_per_task: ${{ inputs.slurm.cpus_per_task }}
            nodes: ${{ inputs.slurm.nodes }}
            node_type: ${{ inputs.slurm.node_type }}
            time: ${{ inputs.slurm.time }}
            scheduler_directives: ${{ inputs.slurm.scheduler_directives }}
          pbs:
            is_enabled: ${{ inputs.pbs.is_enabled }}
            account: ${{ inputs.pbs.account }}
            scheduler_directives: ${{ inputs.pbs.scheduler_directives }}


  session:
    needs:
      - install
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Read hostname and port
        early-cancel: any-job-failed
        retry:
          max-retries: 180
          interval: 10s
        run: |
          # Exit non-zero until the run script has published both files, so the retry above keeps polling
          # Use relative PATHs
          SCRIPT_SUBMITTER_RUNDIR=./subworkflows/script_submitter/step_0/
          PORT_PATH=${SCRIPT_SUBMITTER_RUNDIR}/PORT
          HOSTNAME_PATH=${SCRIPT_SUBMITTER_RUNDIR}/HOSTNAME

          if [ ! -s ${PORT_PATH} ] || [ ! -s ${HOSTNAME_PATH} ]; then
            echo "::notice:: PORT or HOSTNAME not ready yet"
            exit 1
          fi
          PORT=$(cat ${PORT_PATH})
          if [[ ${{ inputs.scheduler }} == "true" ]]; then
            HOSTNAME=$(cat ${HOSTNAME_PATH})
          else
            HOSTNAME=localhost
          fi
          echo "PORT=${PORT}" | tee -a $OUTPUTS
          echo "HOSTNAME=${HOSTNAME}" | tee -a $OUTPUTS

      - name: Create Session
        uses: parallelworks/update-session
        with:
          remotePort: '${{ needs.session.outputs.PORT }}'
          remoteHost: ${{ needs.session.outputs.HOSTNAME }}
          target: ${{ inputs.resource.id }}
          name: ${{ sessions.fractal }}

'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: Resource Target
        tooltip: The compute cluster to run the fractal example on.
        autoselect: true
        optional: false
      resolution:
        type: number
        label: Resolution
        tooltip: Image size in pixels. Larger values look sharper but take longer to render.
        default: 2500
        min: 100
        max: 10000
      rundir:
        label: Run Directory
        type: string
        default: ${PW_PARENT_JOB_DIR}
        tooltip: Run-wide directory (same path on every resource) where the demo and run script are staged on this resource.
      script_path:
        label: Script Path
        type: string
        tooltip: Provide path to an existing script on the target resource.
      scheduler:
        type: boolean
        default: false
        label: Schedule Job?
        hidden: ${{ inputs.resource.schedulerType == '' }}
        ignore: ${{ .hidden }}
        tooltip: |
          Yes → Job is submitted to the scheduler using sbatch, qsub, etc
          No  → Job is executed in the controller or login node instead
      slurm:
        type: group
        label: SLURM Directives
        hidden: ${{ inputs.resource.schedulerType != 'slurm' || inputs.scheduler == false }}
        ignore: ${{ inputs.resource.schedulerType != 'slurm' || inputs.scheduler == false }}
        items:
          is_enabled:
            type: boolean
            hidden: true
            default: true
            label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
          account:
            label: SLURM account
            type: slurm-accounts
            resource: ${{ inputs.resource }}
            tooltip: '--account=value slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          partition:
            type: slurm-partitions
            label: SLURM partition
            optional: true
            resource: ${{ inputs.resource }}
            tooltip: '--qos=partition slurm directive'
          qos:
            label: Quality of Service [QoS]
            type: slurm-qos
            resource: ${{ inputs.resource }}
            tooltip: '--qos=value slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          cpus_per_task:
            label: CPUs per task
            type: number
            default: 1
            tooltip: '--cpus-per-task= SLURM directive to set the number of CPUs per task'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          nodes:
            label: Number of Nodes
            type: number
            default: 1
            tooltip: '--nodes=value slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          node_type:
            label: Node Type
            type: dropdown
            optional: true
            default: ""
            option-key: ${{ inputs.resource.ip }}
            tooltip: '--constraint=<value> slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider || (inputs.resource.ip != 'blueback.navydsrc.hpc.mil' && inputs.resource.ip != 'narwhal.navydsrc.hpc.mil' && inputs.resource.ip != 'nautilus.navydsrc.hpc.mil' && inputs.resource.ip != 'raider.afrl.hpc.mil' && inputs.resource.ip != 'crux.mhpcc.hpc.mil') }}
            hidden: ${{ .ignore }}
            options:
              blueback.navydsrc.hpc.mil:
                - standard
                - bigmem
                - mla
                - viz
                - transfer
              narwhal.navydsrc.hpc.mil:
                - standard
                - bigmem
                - mla
                - smla
                - dmla
                - viz
                - transfer
              nautilus.navydsrc.hpc.mil:
                - standard
                - highclock
                - bigmem
                - mla
                - viz
                - transfer
              raider.afrl.hpc.mil:
                - standard
                - highclock
                - bigmem
                - mla
                - viz
                - transfer
              crux.mhpcc.hpc.mil:
                - AMD
                - Intel

          time:
            label: Walltime
            type: string
            default: '00:30:00'
            tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job (format: D-HH:MM:SS or HH:MM:SS, e.g. 7-00:00:00 or 01:00:00)'
          scheduler_directives:
            type: editor
            optional: true
            tooltip: |
              Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
              #SBATCH --exclusive
              #SBATCH --nodelist=<node-name>
            default: |
              ##SBATCH --constraint=mla # uncomment for Navy and AFRL DSRC systems
      pbs:
        type: group
        label: PBS Directives
        hidden: ${{ inputs.resource.schedulerType != 'pbs' || inputs.scheduler == false }}
        ignore: ${{ inputs.resource.schedulerType != 'pbs' || inputs.scheduler == false }}
        items:
          is_enabled:
            type: boolean
            hidden: true
            default: true
            label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
          account:
            label: Account
            type: string
            tooltip: PBS account for job submission (-A)
          scheduler_directives:
            label: Scheduler Directives
            type: editor
            tooltip: |
              Add extra PBS directives, one per line, using the #PBS prefix. For example:
              #PBS -l mem=16gb
              #PBS -l ngpus=1
            default: |
              # Parameters that apply to all sites
              #PBS -l walltime=01:00:00
              #PBS -V
              #PBS -q standard
              # Remove first # to activate specific lines
              #=====Ruth (Lustre, only vis has NVIDIA)=====
              ##PBS -l select=1:ncpus=128:mpiprocs=128
              #=====Warhawk (Lustre)====
              ##PBS -l select=1:ncpus=128:mpiprocs=128
              #=====Wheat (WEKA, nmlas=4|6)====
              ##PBS -l select=1:ncpus=92:mpiprocs=92:nmlas=4
              #=====Carpenter===
              ##PBS -l select=1:ncpus=192:mpiprocs=192