permissions:
  - '*'

sessions:
  fractal:
    redirect: true

env:
  RESOLUTION: ${{ inputs.resolution }}

jobs:
  install:
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Checkout Fractal Demo
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - workflow/tutorials/hsp/fractal-demo
      - name: Install Dependencies
        run: |
          # keep only the example directory from the sparse checkout
          mv workflow/tutorials/hsp/fractal-demo .
          rm -r workflow
          ./fractal-demo/install.sh
      - name: Create Run Script
        run: |
          cat <<EOF >> script.sh
          # The session needs to know the hostname and PORT for the tunnel
          hostname > HOSTNAME
          export PORT=\$(pw agent open-port)
          echo \${PORT} > PORT
          ${PWD}/fractal-demo/run.sh
          EOF
          chmod +x script.sh
          # We need to pass the PATH to the script submitter subworkflow
          echo "SCRIPT_PATH=${PWD}/script.sh" | tee -a $OUTPUTS


  script_submitter:
    needs:
      - install
    steps:
      - name: Script Submitter
        uses: github/parallelworks/interactive_session@main
        with:
          $yaml: workflow/script_submitter/v3.6/hsp.yaml
          resource: ${{ inputs.resource }}
          shebang: '#!/bin/bash'
          use_existing_script: true
          script_path: ${{ needs.install.outputs.SCRIPT_PATH }}
          scheduler: ${{ inputs.scheduler }}
          use_scheduler_agent: false
          slurm:
            is_enabled: ${{ inputs.slurm.is_enabled }}
            account: ${{ inputs.slurm.account }}
            partition: ${{ inputs.slurm.partition }}
            qos: ${{ inputs.slurm.qos }}
            cpus_per_task: ${{ inputs.slurm.cpus_per_task }}
            nodes: ${{ inputs.slurm.nodes }}
            node_type: ${{ inputs.slurm.node_type }}
            time: ${{ inputs.slurm.time }}
            scheduler_directives: ${{ inputs.slurm.scheduler_directives }}
          pbs:
            is_enabled: ${{ inputs.pbs.is_enabled }}
            account: ${{ inputs.pbs.account }}
            scheduler_directives: ${{ inputs.pbs.scheduler_directives }}


  session:
    needs:
      - install
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Read hostname and port
        early-cancel: any-job-failed
        retry:
          max-retries: 180
          interval: 10s
        run: |
          # Exit non-zero until the run script has published both files, so the retry above keeps polling
          # Use relative PATHs
          SCRIPT_SUBMITTER_RUNDIR=./subworkflows/script_submitter/step_0/
          PORT_PATH=${SCRIPT_SUBMITTER_RUNDIR}/PORT
          HOSTNAME_PATH=${SCRIPT_SUBMITTER_RUNDIR}/HOSTNAME

          if [ ! -s ${PORT_PATH} ] || [ ! -s ${HOSTNAME_PATH} ]; then
            echo "::notice:: PORT or HOSTNAME not ready yet"
            exit 1
          fi
          PORT=$(cat ${PORT_PATH})
          if [[ "${{ inputs.scheduler }}" == "true" ]]; then
            HOSTNAME=$(cat ${HOSTNAME_PATH})
          else
            HOSTNAME=localhost
          fi
          echo "PORT=${PORT}" | tee -a $OUTPUTS
          echo "HOSTNAME=${HOSTNAME}" | tee -a $OUTPUTS

      - name: Create Session
        uses: parallelworks/update-session
        with:
          remotePort: '${{ needs.session.outputs.PORT }}'
          remoteHost: ${{ needs.session.outputs.HOSTNAME }}
          target: ${{ inputs.resource.id }}
          name: ${{ sessions.fractal }}

  first_start_wins:
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    needs:
      - install
    steps:
      - name: First Start Wins
        retry:
          max-retries: 8640
          interval: 10s
        run: |
          # Among all of THIS run's fractal sessions, the winner is the one that
          # started first — createdAt is the primary key and the session name
          # breaks exact ties, so every worker agrees on one winner. The winner
          # publishes CANCEL=false and finishes (its session keeps serving via the
          # script_submitter job); a loser stops its own session and publishes
          # CANCEL=true, which the cancel_render job reads to stop the render — so
          # no job has to sit on `sleep inf`. permissions: ['*'] authenticates pw.
          MY_SESSION="${{ sessions.fractal }}"
          MY_NAME="${MY_SESSION##*/}"   # tolerate an optional "user/" prefix

          winner=$(pw sessions ls -o json | PW_RUN_SLUG="${PW_RUN_SLUG}" python3 -c '
          import json, os, sys
          slug = os.environ.get("PW_RUN_SLUG", "")
          try:
              rows = json.load(sys.stdin)
          except Exception:
              sys.exit(0)   # non-JSON (transient) -> no winner, retry
          ours = [s for s in rows
                  if (s.get("workflowRun") or {}).get("slug") == slug
                  and s.get("name", "").endswith("_fractal")
                  and s.get("status") == "running"]
          ours.sort(key=lambda s: (s.get("createdAt", ""), s.get("name", "")))
          print(ours[0]["name"] if ours else "")
          ')

          echo "$(date) run=${PW_RUN_SLUG} me=${MY_NAME} winner=${winner:-<none>}"

          # No fractal session listed yet (transient): keep polling via retry.
          if [ -z "${winner}" ]; then
            echo "::notice::No fractal session listed yet — waiting"
            exit 1
          fi

          # We are the earliest session visible so far. The session list is
          # eventually consistent, so a worker that started earlier may not be
          # listed yet — confirm we stay first across a few polls before
          # committing, or two workers each seeing only themselves both "win".
          if [ "${winner}" = "${MY_NAME}" ]; then
            if [ "${PW_WORKFLOW_STEP_CURRENT_RETRY:-0}" -lt 3 ]; then
              echo "::notice::${MY_NAME} leading so far — confirming (attempt ${PW_WORKFLOW_STEP_CURRENT_RETRY:-0})"
              exit 1
            fi
            echo "::notice::${MY_NAME} started first — winner; leaving its session up"
            echo "CANCEL=false" | tee -a $OUTPUTS
            exit 0
          fi

          # Another worker started first: stop our session and tell cancel_render
          # to stop the render.
          echo "::notice::${winner} started before ${MY_NAME} — stopping this session"
          pw sessions stop "${MY_SESSION}" || true
          echo "CANCEL=true" | tee -a $OUTPUTS

  cancel_render:
    needs:
      - first_start_wins
    if: ${{ needs.first_start_wins.outputs.CANCEL == 'true' }}
    steps:
      - name: Cancel Jobs
        uses: parallelworks/cancel-jobs
        with:
          jobs:
            - script_submitter


'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: Resource Target
        tooltip: The compute cluster to run the fractal example on.
        autoselect: true
        optional: false
      resolution:
        type: number
        label: Resolution
        tooltip: Image size in pixels. Larger values look sharper but take longer to render.
        default: 2500
        min: 100
        max: 10000
      scheduler:
        type: boolean
        default: false
        label: Schedule Job?
        hidden: ${{ inputs.resource.schedulerType == '' }}
        ignore: ${{ .hidden }}
        tooltip: |
          Yes → Job is submitted to the scheduler using sbatch, qsub, etc
          No  → Job is executed in the controller or login node instead
      slurm:
        type: group
        label: SLURM Directives
        hidden: ${{ inputs.resource.schedulerType != 'slurm' || inputs.scheduler == false }}
        ignore: ${{ inputs.resource.schedulerType != 'slurm' || inputs.scheduler == false }}
        items:
          is_enabled:
            type: boolean
            hidden: true
            default: true
            label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
          account:
            label: SLURM account
            type: slurm-accounts
            resource: ${{ inputs.resource }}
            tooltip: '--account=value slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          partition:
            type: slurm-partitions
            label: SLURM partition
            optional: true
            resource: ${{ inputs.resource }}
            tooltip: '--qos=partition slurm directive'
          qos:
            label: Quality of Service [QoS]
            type: slurm-qos
            resource: ${{ inputs.resource }}
            tooltip: '--qos=value slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          cpus_per_task:
            label: CPUs per task
            type: number
            default: 1
            tooltip: '--cpus-per-task= SLURM directive to set the number of CPUs per task'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          nodes:
            label: Number of Nodes
            type: number
            default: 1
            tooltip: '--nodes=value slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider }}
            hidden: ${{ .ignore }}
          node_type:
            label: Node Type
            type: dropdown
            optional: true
            default: ""
            option-key: ${{ inputs.resource.ip }}
            tooltip: '--constraint=<value> slurm directive'
            ignore: ${{ 'existing' != inputs.resource.provider || (inputs.resource.ip != 'blueback.navydsrc.hpc.mil' && inputs.resource.ip != 'narwhal.navydsrc.hpc.mil' && inputs.resource.ip != 'nautilus.navydsrc.hpc.mil' && inputs.resource.ip != 'raider.afrl.hpc.mil' && inputs.resource.ip != 'crux.mhpcc.hpc.mil') }}
            hidden: ${{ .ignore }}
            options:
              blueback.navydsrc.hpc.mil:
                - standard
                - bigmem
                - mla
                - viz
                - transfer
              narwhal.navydsrc.hpc.mil:
                - standard
                - bigmem
                - mla
                - smla
                - dmla
                - viz
                - transfer
              nautilus.navydsrc.hpc.mil:
                - standard
                - highclock
                - bigmem
                - mla
                - viz
                - transfer
              raider.afrl.hpc.mil:
                - standard
                - highclock
                - bigmem
                - mla
                - viz
                - transfer
              crux.mhpcc.hpc.mil:
                - AMD
                - Intel

          time:
            label: Walltime
            type: string
            default: '00:30:00'
            tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job (format: D-HH:MM:SS or HH:MM:SS, e.g. 7-00:00:00 or 01:00:00)'
          scheduler_directives:
            type: editor
            optional: true
            tooltip: |
              Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
              #SBATCH --exclusive
              #SBATCH --nodelist=<node-name>
            default: |
              ##SBATCH --constraint=mla # uncomment for Navy and AFRL DSRC systems
      pbs:
        type: group
        label: PBS Directives
        hidden: ${{ inputs.resource.schedulerType != 'pbs' || inputs.scheduler == false }}
        ignore: ${{ inputs.resource.schedulerType != 'pbs' || inputs.scheduler == false }}
        items:
          is_enabled:
            type: boolean
            hidden: true
            default: true
            label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
          account:
            label: Account
            type: string
            tooltip: PBS account for job submission (-A)
          scheduler_directives:
            label: Scheduler Directives
            type: editor
            tooltip: |
              Add extra PBS directives, one per line, using the #PBS prefix. For example:
              #PBS -l mem=16gb
              #PBS -l ngpus=1
            default: |
              # Parameters that apply to all sites
              #PBS -l walltime=01:00:00
              #PBS -V
              #PBS -q standard
              # Remove first # to activate specific lines
              #=====Ruth (Lustre, only vis has NVIDIA)=====
              ##PBS -l select=1:ncpus=128:mpiprocs=128
              #=====Warhawk (Lustre)====
              ##PBS -l select=1:ncpus=128:mpiprocs=128
              #=====Wheat (WEKA, nmlas=4|6)====
              ##PBS -l select=1:ncpus=92:mpiprocs=92:nmlas=4
              #=====Carpenter===
              ##PBS -l select=1:ncpus=192:mpiprocs=192