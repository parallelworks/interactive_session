permissions:
  - '*'
env:
  PW_API_KEY: ${PW_API_KEY}
jobs:
  sub:
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: check
        env:
          IN_KEY: ${{ inputs.passed_key }}
        run: |
          echo "SUB env-block: len=${#PW_API_KEY} prefix=${PW_API_KEY:0:3} http=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer ${PW_API_KEY}" https://${PW_PLATFORM_HOST}/api/sessions)"
          echo "SUB passed-in: len=${#IN_KEY} prefix=${IN_KEY:0:3} http=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer ${IN_KEY}" https://${PW_PLATFORM_HOST}/api/sessions)"
'on':
  execute:
    inputs:
      resource: {type: compute-clusters, autoselect: true}
      passed_key: {type: string, label: k, default: none}
