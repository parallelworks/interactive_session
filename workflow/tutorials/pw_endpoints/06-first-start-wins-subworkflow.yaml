permissions:
  - '*'

env:
  RESOLUTION: ${{ inputs.resolution }}

jobs:
  install:
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Checkout Fractal Demo
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - workflow/tutorials/fractal-demo
      - name: Install Dependencies
        run: |
          # keep only the example directory from the sparse checkout
          mv workflow/tutorials/fractal-demo .
          rm -r workflow
          ./fractal-demo/install.sh
      - name: Create Run Script
        run: |
          cat <<EOF >> script.sh
          # Everything the script needs is baked in NOW (expanded at write time):
          # the workflow-level env: does NOT reach the script_submitter subworkflow
          # that runs this script, and PW_RUN_SLUG may not be exported on a
          # compute node. The name prefix fractal-<run-slug>- is shared by every
          # worker in this run — that is what the race below keys on — and the
          # resource name makes this worker's endpoint unique.
          export RESOLUTION=${{ inputs.resolution }}
          pw endpoints run --name fractal-${PW_RUN_SLUG}-${{ inputs.resource.name }} -- ${PWD}/fractal-demo/run.sh
          EOF
          chmod +x script.sh
          # We need to pass the PATH to the script submitter subworkflow
          echo "SCRIPT_PATH=${PWD}/script.sh" | tee -a $OUTPUTS
          echo "SKIP_CLEANUP_PATH=${PWD}/SKIP_CLEANUP" | tee -a $OUTPUTS


  script_submitter:
    needs:
      - install
    steps:
      - name: Script Submitter
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/script_submitter/v3.6/general.yaml
          resource: ${{ inputs.resource }}
          shebang: '#!/bin/bash'
          use_existing_script: true
          script_path: ${{ needs.install.outputs.SCRIPT_PATH }}
          scheduler: ${{ inputs.scheduler }}
          use_scheduler_agent: false
          define_cleanup_script: false
          cleanup_script_path: ''
          # Cleanups stay armed until the skip file exists (see Stage 4): a
          # LOSING worker cancels the submitter with no skip file, so its job
          # is scancel/qdel/killed; the WINNER creates the file first, so its
          # job keeps serving and the run completes.
          submit_and_exit: false
          skip_cleanups_file: ${{ needs.install.outputs.SKIP_CLEANUP_PATH }}
          slurm:
            is_enabled: ${{ inputs.slurm.is_enabled }}
            partition: ${{ inputs.slurm.partition }}
            time: ${{ inputs.slurm.time }}
            scheduler_directives: ${{ inputs.slurm.scheduler_directives }}
          pbs:
            is_enabled: ${{ inputs.pbs.is_enabled }}
            scheduler_directives: ${{ inputs.pbs.scheduler_directives }}

  first_start_wins:
    needs:
      - install
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: First Start Wins
        retry:
          max-retries: 8640
          interval: 10s
        run: |
          # Decide whether this worker keeps its endpoint or stands down, looking
          # only at THIS run's fractal endpoints (name starts with
          # fractal-<run-slug>-, status running). "First start wins" = the first
          # endpoint that is actually RUNNING keeps serving; every other worker
          # cancels itself. The tie-break is list order — whichever running
          # endpoint `pw endpoints list` returns first is the winner, and every
          # worker reads the same list, so they all pick the same one.
          # permissions: ['*'] authenticates pw.
          PREFIX="fractal-${PW_RUN_SLUG}-"
          MY_NAME="fractal-${PW_RUN_SLUG}-${{ inputs.resource.name }}"

          # Prints one word: WAIT | WIN | LOSE.
          decision=$(pw endpoints list | awk -v prefix="${PREFIX}" -v me="${MY_NAME}" '
            index($1, prefix) == 1 && $2 == "running" && !first { first = $1 }
            END {
              if (!first)          print "WAIT"
              else if (first == me) print "WIN"
              else                  print "LOSE"
            }')
          echo "$(date) run=${PW_RUN_SLUG} me=${MY_NAME} decision=${decision:-<none>}"

          # No endpoint running for this run yet (or a transient empty list): keep polling.
          if [ "${decision}" = "WAIT" ] || [ -z "${decision}" ]; then
            echo "No running endpoint for this run yet — waiting"
            exit 1
          fi

          if [ "${decision}" = "WIN" ]; then
            # The endpoint list is eventually consistent, so a worker that started
            # earlier may not be listed yet — a worker that only sees itself would
            # wrongly win. Confirm we stay first across a few polls before committing.
            if [ "${PW_WORKFLOW_STEP_CURRENT_RETRY:-0}" -lt 3 ]; then
              echo "::notice::${MY_NAME} leading so far — confirming (attempt ${PW_WORKFLOW_STEP_CURRENT_RETRY:-0})"
              exit 1
            fi
            URL=$(pw endpoints list | grep -w "${MY_NAME}" | awk '{print $3}')
            echo "URL=${URL}" | tee -a $OUTPUTS
            echo "::notice::${MY_NAME} is the first running endpoint — winner; serving at ${URL}"
            # Winner: create the skip file so the cancel below leaves the job
            # serving (Stage 4's trick). The run completes; the page stays up.
            touch ${{ needs.install.outputs.SKIP_CLEANUP_PATH }}
            sleep 2
            exit 0
          fi

          # decision == LOSE: another worker's endpoint is running ahead of us.
          # No skip file for us — the cancel below kills our render and our
          # endpoint deregisters with it.
          echo "::notice::another endpoint is running ahead of ${MY_NAME} — standing down"
      - name: Cancel Script Submitter
        # Winner and loser both cancel the submitter; the skip file decides what
        # that means. Winner: cleanup skipped, job keeps serving. Loser:
        # cleanups run, the job dies, and the endpoint deregisters on its own —
        # the guarded delete is a defensive no-op for a lingering process.
        uses: parallelworks/cancel-jobs
        with:
          jobs:
            - script_submitter
        cleanup: test -f ${{ needs.install.outputs.SKIP_CLEANUP_PATH }} || pw endpoints delete "fractal-${PW_RUN_SLUG}-${{ inputs.resource.name }}" || true


'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: Resource Target
        tooltip: The compute cluster to run the fractal example on.
        autoselect: true
        optional: false
      resolution:
        type: number
        label: Resolution
        tooltip: Image size in pixels. Larger values look sharper but take longer to render.
        default: 2500
        min: 100
        max: 10000
      scheduler:
        type: boolean
        default: false
        label: Schedule Job?
        hidden: ${{ inputs.resource.schedulerType == '' }}
        ignore: ${{ .hidden }}
        tooltip: |
          Yes → Job is submitted to the scheduler using sbatch, qsub, etc
          No  → Job is executed in the controller or login node instead
      slurm:
        type: group
        label: SLURM Directives
        hidden: ${{ inputs.resource.schedulerType != 'slurm' || inputs.scheduler == false }}
        ignore: ${{ inputs.resource.schedulerType != 'slurm' || inputs.scheduler == false }}
        items:
          is_enabled:
            type: boolean
            hidden: true
            default: true
            label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
          partition:
            type: slurm-partitions
            label: SLURM partition
            optional: true
            resource: ${{ inputs.resource }}
            tooltip: Select a partition from the drop down menu.
          time:
            label: Walltime
            type: string
            default: '00:30:00'
            tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job'
          scheduler_directives:
            type: editor
            optional: true
            tooltip: |
              Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
              #SBATCH --exclusive
              #SBATCH --nodelist=<node-name>
      pbs:
        type: group
        label: PBS Directives
        hidden: ${{ inputs.resource.schedulerType != 'pbs' || inputs.scheduler == false }}
        ignore: ${{ inputs.resource.schedulerType != 'pbs' || inputs.scheduler == false }}
        items:
          is_enabled:
            type: boolean
            hidden: true
            default: true
            label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
          scheduler_directives:
            label: Scheduler Directives
            type: editor
            tooltip: |
              Add extra PBS directives, one per line, using the #PBS prefix. For example:
              #PBS -l walltime=01:00:00
              #PBS -l mem=16gb
