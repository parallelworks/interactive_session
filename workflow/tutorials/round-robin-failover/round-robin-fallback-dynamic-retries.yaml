# GPU availability probe with round-robin fallback across a list of resources.
#
# The workflow accepts a user-defined list of compute resources and attempts to
# verify GPU availability on each one by running `nvidia-smi` over SSH.
#
# On each attempt (first try + retries), it picks the target resource using:
#
#   target = workers[ attempt_index % N ]
#
# where N is the number of workers in the list. This means:
#   - Attempts cycle through the list in order.
#   - If a resource fails (nvidia-smi error, SSH timeout, etc.) the next
#     attempt automatically moves to the next resource in the list.
#   - Once the end of the list is reached, it wraps back to the first resource.
#   - The step succeeds as soon as any resource responds with a working GPU.
#   - If max-retries is exhausted without a successful nvidia-smi, the workflow fails.
#
# Example with 3 workers and max-retries: 4  (= 5 total attempts):
#   attempt 0 → workers[0]   (first try)
#   attempt 1 → workers[1]   (retry 1)
#   attempt 2 → workers[2]   (retry 2)
#   attempt 3 → workers[0]   (retry 3, wraps around)
#   attempt 4 → workers[1]   (retry 4)
jobs:
  round_robin_fallback:
    steps:
      - name: Get Number of workers
        run: |
          # inputs.workers is proper JSON — parse it with python3
          NUM_WORKERS=$(echo '${{ inputs.workers }}' | \
            python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "NUM_WORKERS=$NUM_WORKERS" | tee -a $OUTPUTS
          echo "Worker count: $NUM_WORKERS"
      - name: Round Robin Fallback
        retry:
          max-retries: ${{ needs.round_robin_fallback.outputs.NUM_WORKERS - 1 }}
          interval: 2s
          timeout: 60s
        run: |
          read TARGET_IP TARGET_NAME <<< $(echo '${{ inputs.workers }}' | python3 -c "import sys,json; w=json.load(sys.stdin); idx=int('${PW_WORKFLOW_STEP_CURRENT_RETRY}') % len(w); r=w[idx]['resource']; print(r['ip'], r['name'])")
          echo "Retry index: ${PW_WORKFLOW_STEP_CURRENT_RETRY}/${PW_WORKFLOW_STEP_MAX_RETRIES}, resource: ${TARGET_NAME} (${TARGET_IP})"
          ssh "${TARGET_IP}" nvidia-smi
          EXIT_CODE=$?
          echo "EXIT_CODE=${EXIT_CODE}" >> $OUTPUTS
          exit ${EXIT_CODE}
      - name: Check Exit Code
        if: ${{ always }}
        run: |
          EXIT_CODE="${{ needs.round_robin_fallback.outputs.EXIT_CODE }}"
          if [ "${EXIT_CODE}" = "0" ]; then
            echo "::notice::GPU is available"
          else
            echo "::error title=GPU Unavailable::nvidia-smi failed on all resources (exit code: ${EXIT_CODE})"
          fi
'on':
  execute:
    inputs:
      workers:
        type: list
        label: Compute Workers
        tooltip: Add one or more compute worker sites. Workers connect to the head node and process Ray tasks. For same-site SLURM workers, select the same resource as the head.
        template:
          resource:
            label: Resource
            type: compute-clusters
            include-workspace: false
            tooltip: Select a compute resource for Ray workers.
