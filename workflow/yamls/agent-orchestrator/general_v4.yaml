# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
#
# Agent ORCHESTRATOR -- one chat model that coordinates your per-cluster agents
# (lite-agent and/or hermes-agent). Always runs on your workspace, so it can
# `pw ssh` to every cluster. It auto-discovers worker agents whose fleet "marker"
# matches its own -- launch agents on each cluster, then launch this with the same
# marker and chat with it from the platform.
permissions:
  - '*'

sessions:
  agent_orchestrator:       # workspace openAI session -> registers as a chat model
    openAI: true
    redirect: false

env:
  PW_API_KEY: ${PW_API_KEY}   # runtime brain credential, injected into every step

jobs:
  preprocessing:
    ssh:
      remoteHost: ${{ inputs.resource.ip }}   # workspace -> empty ip -> runs locally
    steps:
      - name: Checkout
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - ${{ inputs.service.name }}
            - tools/utils
      - name: Create Inputs
        run: |
          set -x
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          cat <<'EOF' >> inputs.sh
          PATH=$HOME/pw:$PATH
          service_name="${{ inputs.service.name }}"
          service_marker="${{ inputs.service.marker }}"
          service_model="${{ inputs.service.model }}"
          service_allocation="${{ inputs.service.allocation }}"
          service_parent_install_dir="${{ inputs.service.parent_install_dir }}"
          AGENT_ASK_TIMEOUT="${{ inputs.service.ask_timeout }}"
          EOF
          # Workers are auto-discovered at runtime via `pw sessions ls` + marker probe.
          # Brain key is the runtime PW_API_KEY -- intentionally NOT written to inputs.sh.
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh
          sed -i 's/^/export /' inputs.sh
          # System prompt -> a file (kept out of inputs.sh so multi-line text can't
          # break the sourced shell). The start script points AGENT_SYSTEM_PROMPT_FILE at it.
          cat > system_prompt.txt <<'__SYSTEM_PROMPT_EOF__'
          ${{ inputs.service.system_prompt }}
          __SYSTEM_PROMPT_EOF__

  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/general.yaml
          session: ${{ sessions.agent_orchestrator }}
          resource: ${{ inputs.resource }}
          cluster:                       # workspace has no scheduler -> all literals
            scheduler: false
            slurm:
              is_enabled: false
              partition: ""
              time: "01:00:00"
              scheduler_directives: ""
            pbs:
              is_enabled: false
              scheduler_directives: ""
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.name }}/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.name }}/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/inputs.sh
            rundir: ${PW_PARENT_JOB_DIR}

'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: Orchestrator host
        hidden: true               # always the workspace
        default: workspace
        include-workspace: true
        tooltip: The orchestrator always runs on your workspace so it can reach every cluster.
      service:
        type: group
        label: Settings
        items:
          name:
            type: string
            hidden: true
            default: agent-orchestrator
          marker:
            label: Fleet marker
            type: string
            default: worker
            tooltip: >-
              Only agents launched with this SAME marker are discovered and
              coordinated. Use a custom value (e.g. "gpuworker") to target a
              specific fleet.
          system_prompt:
            label: System prompt
            type: editor
            default: >-
              You are an orchestrator that coordinates agents, one per compute
              cluster. Call list_clusters to see which clusters are available, then
              ask_cluster(cluster, question) to have that cluster's agent inspect or
              act on its machine and report back. To compare clusters (e.g. 'where
              should I run this GPU job?'), ask each relevant cluster in the SAME turn
              so they run in parallel, then synthesize their replies into one clear
              recommendation. Only ask clusters returned by list_clusters.
            tooltip: Instructions that define how the orchestrator coordinates the cluster agents.
          model:
            label: Model
            type: string
            default: org:glm/glm-5.1
            tooltip: >-
              The LLM that powers the orchestrator (must support tool calling). Any
              id from `pw ai models ls`, or the short name shown in the Chat model
              picker (e.g. glm-5.1, or /gpt-oss-20b for a session-served model) --
              it is resolved to the full provider id automatically.
          allocation:
            label: AI allocation
            type: string
            default: Private LLM Group
            tooltip: Which allocation to bill model usage against (for org:* models).
          parent_install_dir:
            label: Parent install directory
            type: string
            default: ${HOME}/pw/software
            tooltip: >-
              Where the agent creates its small private Python virtualenv
              (isolated from the system Python). Needs a little free space.
          ask_timeout:
            label: Per-cluster timeout (seconds)
            type: integer
            default: 300
            tooltip: How long to wait for a cluster's agent to answer a delegated question.
