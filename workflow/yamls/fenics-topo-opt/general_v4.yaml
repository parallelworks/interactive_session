# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
permissions:
  - '*'
sessions:
  session:
    useTLS: false
    redirect: true

jobs:
  preprocessing:
      ssh:
        remoteHost: ${{ inputs.cluster.resource.ip }}
      steps:
        - name: Checkout
          uses: parallelworks/checkout
          with:
            repo: https://github.com/parallelworks/interactive_session.git
            branch: main
            sparse_checkout:
              - ${{ inputs.service.name }}
        - name: Create Inputs
          run: |
            set -x
            # Write PW variables
            env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
            # Encase values between quotes
            sed -i 's/=\(.*\)/="\1"/' inputs.sh
            # Write input form variables and ensure the pw agent is in the PATH
            cat <<'EOF' >> inputs.sh
            PATH=$HOME/pw:$PATH
            service_conda_install="${{ inputs.service.conda_install }}"
            service_parent_install_dir="${{ inputs.service.parent_install_dir }}"
            service_conda_install_dir="${{ inputs.service.conda_install_dir }}"
            service_conda_env="${{ inputs.service.conda_env }}"
            service_load_env="${{ inputs.service.load_env }}"
            service_nelx="${{ inputs.service.nelx }}"
            service_nely="${{ inputs.service.nely }}"
            service_volfrac="${{ inputs.service.volfrac }}"
            service_penal="${{ inputs.service.penal }}"
            service_num_iterations="${{ inputs.service.num_iterations }}"
            service_load_type="${{ inputs.service.load_type }}"
            EOF
            # Remove empty variables
            sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
            sed -i '/=""/d' inputs.sh # remove var=""
            # Add export= to all lines
            sed -i 's/^/export /' inputs.sh

  session_runner:
    needs:
      - preprocessing
    ssh:
        remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - uses: marketplace/session_runner/v1.4
        early-cancel: any-job-failed
        with:
          session: ${{ sessions.session }}
          resource: ${{ inputs.cluster.resource }}
          cluster:
            scheduler: ${{ inputs.cluster.scheduler }}
            slurm:
              is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
              partition: ${{ inputs.cluster.slurm.partition }}
              scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
              time: ${{ inputs.cluster.slurm.time }}
            pbs:
              is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
              scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.name }}/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.name }}/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/inputs.sh
            rundir: ${PW_PARENT_JOB_DIR}

'on':
  execute:
    inputs:
      cluster:
        type: group
        label: Compute Cluster Settings
        items:
          resource:
            type: compute-clusters
            label: Service host
            include-workspace: false
            tooltip: Resource to host the service
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            hidden: ${{ inputs.cluster.resource.schedulerType == '' }}
            ignore: ${{ .hidden }}
            tooltip: |
              Yes - Job is submitted to the scheduler using sbatch, qsub, etc
              No  - Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.cluster.resource }}
                tooltip: Select a partition from the drop down menu.
              time:
                label: Walltime
                type: string
                default: '01:00:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Type in additional scheduler directives.
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: Type the PBS scheduler directives

      service:
        type: group
        label: Topology Optimization Settings
        items:
          name:
            type: string
            hidden: true
            default: fenics-topo-opt
          load_type:
            label: Load Type
            type: dropdown
            default: cantilever
            tooltip: Defines the structural optimization problem (loads and boundary conditions)
            options:
              - value: cantilever
                label: Cantilever - Left edge fixed, point load at mid-right
              - value: mbb_beam
                label: MBB Beam - Half-symmetry, classic structural benchmark
              - value: bridge
                label: Bridge - Bottom corners pinned, distributed top load
              - value: half_wheel
                label: Half Wheel - Center bottom support, distributed top load
          nelx:
            label: Mesh Elements (X)
            type: number
            default: 120
            tooltip: Number of finite elements in the horizontal direction. Higher values give finer resolution but slower computation.
          nely:
            label: Mesh Elements (Y)
            type: number
            default: 60
            tooltip: Number of finite elements in the vertical direction. Higher values give finer resolution but slower computation.
          volfrac:
            label: Volume Fraction
            type: string
            default: '0.5'
            tooltip: Target material volume fraction (0 to 1). Lower values remove more material and produce sparser structures.
          penal:
            label: Penalization Exponent
            type: string
            default: '3.0'
            tooltip: SIMP penalization power. Higher values (3-5) push densities toward 0 or 1. Standard value is 3.
          num_iterations:
            label: Max Iterations
            type: number
            default: 100
            tooltip: Maximum number of optimization iterations. The solver will stop early if convergence is reached.
          conda_install:
            label: Install conda environment?
            type: boolean
            default: true
            tooltip: Select Yes to install FEniCS in a new conda environment, or No to use an existing Python environment with FEniCS.
          parent_install_dir:
            label: Software Install Directory
            type: string
            default: ${HOME}/pw/software
            hidden: ${{ inputs.service.conda_install == false }}
            ignore: ${{ .hidden }}
            tooltip: Directory where Miniconda and the FEniCS environment will be installed. Ensure sufficient space (~3 GB).
          conda_install_dir:
            label: Conda Installation Directory Name
            type: string
            default: .miniconda3c
            hidden: ${{ inputs.service.conda_install == false }}
            ignore: ${{ .hidden }}
            tooltip: Name of the Miniconda directory inside the software install directory.
          conda_env:
            label: Conda Environment Name
            type: string
            default: fenics-topo-opt
            hidden: ${{ inputs.service.conda_install == false }}
            optional: ${{ .hidden }}
            ignore: ${{ .hidden }}
            tooltip: Name of the conda environment for FEniCS and dashboard dependencies.
          load_env:
            label: Command to Load FEniCS Environment
            type: string
            default: source ${HOME}/pw/software/.miniconda3c/etc/profile.d/conda.sh; conda activate fenics-topo-opt
            hidden: ${{ inputs.service.conda_install == true }}
            optional: ${{ .hidden }}
            ignore: ${{ .hidden }}
            tooltip: Bash command to activate an existing environment with FEniCS installed.
