# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
#
# Hermes Agent -- the real NousResearch Hermes (https://github.com/NousResearch/hermes-agent)
# running on a cluster's login node. The "Interface" setting picks how you reach it:
#   dashboard -> Hermes' native web UI served at the endpoint's subdomain URL.
#   chat      -> `pw endpoints run --openai` registers it as a model in the
#                platform Chat and AI providers.
permissions:
  - '*'

env:
  PW_API_KEY: ${PW_API_KEY}   # runtime brain credential, injected into every step

jobs:
  preprocessing:
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Checkout
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - ${{ inputs.service.name }}
            - tools/utils
      - name: Create Inputs
        run: |
          set -x
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          cat <<'EOF' >> inputs.sh
          PATH=$HOME/.local/bin:$HOME/pw:$PATH
          service_name="${{ inputs.service.name }}"
          service_interface="${{ inputs.service.interface }}"
          service_marker="${{ inputs.service.marker }}"
          service_data_dir="${{ inputs.service.data_dir }}"
          service_fresh_start="${{ inputs.service.fresh_start }}"
          service_model="${{ inputs.service.hermes_model }}"
          service_allocation="${{ inputs.service.allocation }}"
          service_hermes_version="${{ inputs.service.hermes_version }}"
          service_parent_install_dir="${{ inputs.service.parent_install_dir }}"
          pw_endpoints_args="--name ${{ inputs.service.name }}-${PW_RUN_SLUG}"
          EOF
          # Brain key is the runtime PW_API_KEY -- intentionally NOT written to inputs.sh
          # (the start script writes it into the per-session Hermes config instead).
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh
          sed -i 's/^/export /' inputs.sh
          # Persona -> a file (kept out of inputs.sh so multi-line text can't break
          # the sourced shell). The start script installs it as the data dir's SOUL.md.
          cat > soul.md <<'__HERMES_SOUL_EOF__'
          ${{ inputs.service.soul }}
          __HERMES_SOUL_EOF__
      - name: Controller Preprocessing
        run: |
          set -x
          # This script prepares the target host and always runs in the controller node
          cp inputs.sh controller-${PW_JOB_ID}.sh
          cat ${{ inputs.service.name }}/controller-v4.sh >> controller-${PW_JOB_ID}.sh
          bash controller-${PW_JOB_ID}.sh
      - name: Create Service Script
        run: |
          rm -f HOSTNAME SESSION_PORT job.ended job.started
          # This script starts the service
          cp inputs.sh start-service-${PW_JOB_ID}.sh

          # Write code common to all services
          cat <<'EOF' >> start-service-${PW_JOB_ID}.sh

          cleanup() {
              trap - EXIT INT TERM HUP QUIT USR1 USR2 PIPE
              echo "::notice::Cleaning up..."
              if [ -f cancel.sh ]; then
                  mv cancel.sh cancel.sh.submitted
                  echo "echo Cleanup script was already executed" > cancel.sh
                  bash cancel.sh.submitted
              fi
              kill -- -$$
          }

          trap cleanup EXIT INT TERM HUP QUIT USR1 USR2 PIPE

          echo "::notice::Starting service"
          EOF
          cat ${{ inputs.service.name }}/start-template-v4.sh >> ./start-service-${PW_JOB_ID}.sh
          echo "SCRIPT_PATH=${PWD}/start-service-${PW_JOB_ID}.sh" | tee -a $OUTPUTS
          echo "SKIP_CLEANUP_PATH=${PWD}/SKIP_CLEANUP" | tee -a $OUTPUTS

  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/script_submitter/v3.6/general.yaml
          resource: ${{ inputs.cluster.resource }}
          shebang: '#!/bin/bash'
          use_existing_script: true
          script_path: ${{ needs.preprocessing.outputs.SCRIPT_PATH }}
          define_cleanup_script: true
          cleanup_script_path: ./cancel.sh
          scheduler: ${{ inputs.cluster.scheduler }}
          use_scheduler_agent: false
          submit_and_exit: false
          skip_cleanups_file: ${{ needs.preprocessing.outputs.SKIP_CLEANUP_PATH }}
          slurm:
            is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
            partition: ${{ inputs.cluster.slurm.partition }}
            scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
            time: ${{ inputs.cluster.slurm.time }}
          pbs:
            is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
            scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}

  wait_for_endpoint:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Wait for endpoint
        early-cancel: any-job-failed
        run: |
          endpoint_name="${{ inputs.service.name }}-${PW_RUN_SLUG}"
          echo "::notice::Waiting for endpoint ${endpoint_name} to come online"
          until pw endpoints list | grep -qw "${endpoint_name}"; do
            echo "$(date) Endpoint ${endpoint_name} not found yet; retrying in 10 seconds"
            sleep 10
          done
          echo "::notice::Endpoint ${endpoint_name} is online"
          touch ${{ needs.preprocessing.outputs.SKIP_CLEANUP_PATH }}
          sleep 2
      - name: Cancel Script Submitter
        uses: parallelworks/cancel-jobs
        with:
          jobs:
            - session_runner

'on':
  execute:
    inputs:
      cluster:
        type: group
        label: Cluster
        items:
          resource:
            type: compute-clusters
            label: Cluster
            include-workspace: false
            tooltip: The cluster to run Hermes on. Keep "Schedule Job" off so it stays on the login node (where it has internet for install + model calls).
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            hidden: ${{ inputs.cluster.resource.schedulerType == '' }}
            ignore: ${{ .hidden }}
            tooltip: |
              Keep this off. Hermes must stay on the login node so the platform
              can reach it and so it has the internet access its brain and
              installer need.
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM enabled?
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.cluster.resource }}
              time:
                label: Walltime
                type: string
                default: '01:00:00'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: Extra #SBATCH directives, one per line.
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled?
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: Extra #PBS directives, one per line.
      service:
        type: group
        label: Settings
        items:
          name:
            type: string
            hidden: true
            default: hermes-agent
          interface:
            label: Interface
            type: dropdown
            default: dashboard
            options:
              - label: Web dashboard (Hermes' native browser UI, with a Chat tab)
                value: dashboard
              - label: Built-in platform chat (registers as an OpenAI model)
                value: chat
            tooltip: >-
              How to reach Hermes. "Web dashboard" serves Hermes' own web UI
              at the endpoint URL (recommended). "Built-in platform chat" exposes
              it as an OpenAI model in the platform Chat instead.
          marker:
            label: Fleet marker
            hidden: ${{ inputs.service.interface != 'chat' }}
            ignore: ${{ .hidden }}
            type: string
            default: worker
            tooltip: >-
              For Built-in chat mode: an agent-orchestrator launched with the SAME
              marker will discover and coordinate this Hermes. Use a custom value
              (e.g. "gpuworker") to keep separate fleets apart. (Ignored in dashboard mode.)
          hermes_model:
            label: Model
            type: string
            default: org:glm/glm-5.1
            tooltip: >-
              The LLM that powers Hermes (must support tool calling). Any id from
              `pw ai models ls`, or the short name shown in the Chat model picker
              (e.g. glm-5.1, or /gpt-oss-20b for a session-served model) -- it is
              resolved to the full provider id automatically.
          allocation:
            label: AI allocation
            type: organization-groups
            tooltip: Which allocation to bill model usage against (for org:* models).
          parent_install_dir:
            label: Parent install directory
            type: string
            default: ${HOME}/pw/software
            tooltip: >-
              Where a small private Python virtualenv is created for the
              resolve_model helper (isolated from the system Python).
          hermes_version:
            label: Hermes version
            type: string
            default: v2026.6.19
            tooltip: >-
              Pins Hermes to a tested release of NousResearch/hermes-agent so an
              upstream update can't change its behavior and break the session.
              A release tag (e.g. v2026.6.19), or a branch or commit SHA for
              advanced use. Change only to adopt a newer release you have verified.
          soul:
            label: Persona
            type: editor
            default: >-
              You are a helpful, precise AI assistant running on a compute cluster.
              You can run shell commands, write and run code, and manage jobs on this
              machine. Answer from real command output rather than guessing, keep
              replies concise, and show the commands you run. Say what you are about
              to do before anything destructive, and for long-running work (large
              jobs, downloads, training) start or submit it and report how to check
              on it instead of waiting.
            tooltip: >-
              Hermes' personality and instructions (its SOUL.md). Applied on every
              launch; edit to change its tone, rules, or expertise.
          data_dir:
            label: Data directory
            type: string
            default: ~/.hermes-agent
            tooltip: >-
              Where Hermes keeps conversation history, skills, and memory on the
              cluster. Persists across runs, so cancelling and rerunning the
              workflow resumes where you left off. Absolute path, or one starting with ~.
          fresh_start:
            label: Start fresh
            type: boolean
            default: false
            tooltip: Wipe the data directory before starting — clears all saved history, skills, and memory.
