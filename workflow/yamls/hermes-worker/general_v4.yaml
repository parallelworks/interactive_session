# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
#
# Hermes WORKER agent -- one long-lived agent per cluster, on the login node.
# Run this once per cluster you want a worker on. The orchestrator workflow
# reaches each worker with `pw ssh <cluster> curl localhost:<agent_port>`.
#
# Brain: the platform OpenAI-compatible endpoint. The token is the org secret
# PW_PLATFORM_TOKEN (create it in the platform UI before running).
permissions:
  - '*'
sessions:
  session:
    redirect: true

jobs:
  preprocessing:
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Checkout
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: hermes-agent   # dev branch; flip to main after review/merge
          sparse_checkout:
            - ${{ inputs.service.name }}
      - name: Create Inputs
        run: |
          set -x
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          cat <<'EOF' >> inputs.sh
          PATH=$HOME/pw:$PATH
          service_name="${{ inputs.service.name }}"
          hermes_role="worker"
          service_parent_install_dir="${{ inputs.service.parent_install_dir }}"
          service_hermes_model="${{ inputs.service.hermes_model }}"
          service_openai_base_url="${{ inputs.service.openai_base_url }}"
          service_hermes_install_cmd="${{ inputs.service.hermes_install_cmd }}"
          service_allocation="${{ inputs.service.allocation }}"
          service_port="${{ inputs.service.agent_port }}"
          EOF
          # Brain key is the runtime PW_API_KEY -- intentionally NOT written to inputs.sh
          # (the env|grep above already excludes PW_API_KEY).
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh
          sed -i 's/^/export /' inputs.sh

  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/general.yaml
          session: ${{ sessions.session }}
          resource: ${{ inputs.cluster.resource }}
          cluster:
            scheduler: ${{ inputs.cluster.scheduler }}
            slurm:
              is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
              partition: ${{ inputs.cluster.slurm.partition }}
              scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
              time: ${{ inputs.cluster.slurm.time }}
            pbs:
              is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
              scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.name }}/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.name }}/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/inputs.sh
            rundir: ${PW_PARENT_JOB_DIR}

'on':
  execute:
    inputs:
      cluster:
        type: group
        label: Worker Cluster
        items:
          resource:
            type: compute-clusters
            label: Worker host
            include-workspace: false
            tooltip: Cluster to run this Hermes worker on. Use a login node (Schedule Job = No) so the orchestrator can reach it via `pw ssh <cluster>`.
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            hidden: ${{ inputs.cluster.resource.schedulerType == '' }}
            ignore: ${{ .hidden }}
            tooltip: |
              Keep this No. The worker must run on the login node so the
              orchestrator's `pw ssh <cluster> curl localhost:<port>` reaches it
              (and the login node has the internet access the brain needs).
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM enabled?
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.cluster.resource }}
              time:
                label: Walltime
                type: string
                default: '01:00:00'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: Extra #SBATCH directives, one per line.
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled?
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: Extra #PBS directives, one per line.
      service:
        type: group
        label: Hermes Worker Settings
        items:
          name:
            type: string
            hidden: true
            default: hermes-agent
          agent_port:
            label: Agent port
            type: integer
            default: 8717
            tooltip: Fixed port the worker listens on. The orchestrator must use the same value. Pinned so the roster is just a list of cluster names.
          hermes_model:
            label: Model (brain)
            type: string
            default: org:glm/glm-5.1
            tooltip: Model id as `pw ai models ls` shows it. Must be tool-calling-capable.
          allocation:
            label: AI allocation (X-Allocation)
            type: string
            default: Private LLM Group
            tooltip: Allocation name to bill org-provider (org:*) inference against, from `GET /api/allocations`.
          openai_base_url:
            label: Platform OpenAI endpoint
            type: string
            optional: true
            tooltip: Defaults to https://<platform-host>/api/openai/v1 (derived from PW_PLATFORM_HOST). Override only if needed.
          hermes_install_cmd:
            label: Hermes install command
            type: string
            optional: true
            tooltip: Command the controller runs to install hermes if missing (see Hermes docs). Leave empty to run the agent in stub mode (plumbing only).
          parent_install_dir:
            label: Install directory
            type: string
            hidden: true
            default: ${HOME}/pw/software
