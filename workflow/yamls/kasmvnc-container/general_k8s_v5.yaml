# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
permissions:
  - '*'
env:
  PW_API_KEY: ${PW_API_KEY}

jobs:
  preprocessing:
    if: ${{ inputs.resource.type != 'kubernetes' }}
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Checkout ${{ inputs.container_runtime }}
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - ${{ inputs.container_runtime }}
            - tools/oras
      - name: Create Inputs
        run: |
          set -x
          # Write PW variables
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          # Encase values between quotes
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          # Password (vestigial: the container disables VNC auth, but the viewer
          # accepts it in the URL, so keep v4 parity)
          password=$(openssl rand -base64 12 | head -c 12)
          # Any non-root path: the container's nginx template renders a duplicate
          # `location /` (and fails) when BASE_PATH is "/", while any other value
          # is harmless because the template also proxies the root location,
          # which is where the subdomain endpoint serves from.
          basepath=/kasm
          # Write input form variables and ensure the pw agent is in the PATH
          cat <<'EOF' >> inputs.sh
          PATH=$HOME/pw:$PATH
          kasmvnc_os="${{ inputs.desktop.kasmvnc_os }}"
          startup_command="${{ inputs.desktop.startup_command }}"
          container_mount_paths="${{ inputs.desktop.container_mount_paths }}"
          EOF
          echo basepath=${basepath} >> inputs.sh
          echo password=${password} >> inputs.sh
          echo "endpoint_name=kasmvnc-${PW_RUN_SLUG}" >> inputs.sh
          echo "endpoint_slug=\"vnc.html?resize=remote&autoconnect=true&show_dot=true&path=websockify&password=${password}&dt=0\"" >> inputs.sh
          # Remove empty variables
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh # remove var=""
          # Prepend 'export ' to each VAR= assignment line only -- NOT to the
          # continuation lines of a multi-line value. container_mount_paths is an
          # 'editor' input written one path per line; a blanket 's/^/export /' would
          # turn each extra path into 'export /path' and corrupt inputs.sh.
          sed -i -E 's/^([A-Za-z_][A-Za-z0-9_]*=)/export \1/' inputs.sh
      - name: Controller Preprocessing
        run: |
          set -x
          # This script prepares the target host and always runs in the controller node
          cp inputs.sh controller-${PW_JOB_ID}.sh
          cat ${{ inputs.container_runtime }}/controller-v4.sh >> controller-${PW_JOB_ID}.sh
          bash controller-${PW_JOB_ID}.sh
      - name: Create Service Script
        run: |
          rm -f HOSTNAME SESSION_PORT job.ended job.started
          # This script starts the service
          cp inputs.sh start-service-${PW_JOB_ID}.sh

          # Write code common to all services
          cat <<'EOF' >> start-service-${PW_JOB_ID}.sh

          cleanup() {
              trap - EXIT INT TERM HUP QUIT USR1 USR2 PIPE
              echo "::notice::Cleaning up..."
              if [ -f cancel.sh ]; then
                  mv cancel.sh cancel.sh.submitted
                  echo "echo Cleanup script was already executed" > cancel.sh
                  bash cancel.sh.submitted
              fi
              kill -- -$$
          }

          trap cleanup EXIT INT TERM HUP QUIT USR1 USR2 PIPE

          echo "::notice::Starting service"
          EOF
          cat ${{ inputs.container_runtime }}/start-template-v4.sh >> ./start-service-${PW_JOB_ID}.sh
          echo "SCRIPT_PATH=${PWD}/start-service-${PW_JOB_ID}.sh" | tee -a $OUTPUTS
          echo "SKIP_CLEANUP_PATH=${PWD}/SKIP_CLEANUP" | tee -a $OUTPUTS

  session_runner:
    if: ${{ inputs.resource.type != 'kubernetes' }}
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/script_submitter/v3.6/general.yaml
          resource: ${{ inputs.resource }}
          shebang: '#!/bin/bash'
          use_existing_script: true
          script_path: ${{ needs.preprocessing.outputs.SCRIPT_PATH }}
          define_cleanup_script: true
          cleanup_script_path: ./cancel.sh
          scheduler: ${{ inputs.cluster.scheduler }}
          use_scheduler_agent: false
          submit_and_exit: false
          skip_cleanups_file: ${{ needs.preprocessing.outputs.SKIP_CLEANUP_PATH }}
          slurm:
            is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
            partition: ${{ inputs.cluster.slurm.partition }}
            scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
            time: ${{ inputs.cluster.slurm.time }}
          pbs:
            is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
            scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}
        cleanup: |
          set -x
          if [ -d tools/oras ]; then
            echo "Removing tools/oras"
            rm -rf tools/oras
          fi

  wait_for_endpoint:
    if: ${{ inputs.resource.type != 'kubernetes' }}
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Wait for endpoint
        early-cancel: any-job-failed
        run: |
          endpoint_name="kasmvnc-${PW_RUN_SLUG}"
          echo "::notice::Waiting for endpoint ${endpoint_name} to come online"
          until pw endpoints list | grep -qw "${endpoint_name}"; do
            echo "$(date) Endpoint ${endpoint_name} not found yet; retrying in 10 seconds"
            sleep 10
          done
          echo "::notice::Endpoint ${endpoint_name} is online"
          touch ${{ needs.preprocessing.outputs.SKIP_CLEANUP_PATH }}
          sleep 2
      - name: Cancel Script Submitter
        uses: parallelworks/cancel-jobs
        with:
          jobs:
            - session_runner

  auth_k8s:
    if: ${{ inputs.resource.type == 'kubernetes' }}
    steps:
      - name: Authenticate kubectl
        early-cancel: any-job-failed
        run: pw kube auth ${{ inputs.resource.name }}
  prepare_k8s_pvc:
    if: ${{ inputs.resource.type == 'kubernetes' }}
    needs:
      - auth_k8s
    steps:
      - name: Creating New PVC YAML
        early-cancel: any-job-failed
        if: ${{ inputs.k8s.volumes.pvc == New  }}
        run: |
          if [[ ${{ inputs.k8s.volumes.pvc_persist }} == "true" ]]; then
            pvc_name="${{ inputs.k8s.volumes.pvc_name }}"
          else
            job_number=$(pwd | rev | cut -d "/" -f1 | rev)
            workflow_name=$(pwd | rev | cut -d "/" -f2 | rev)
            pvc_name=$(echo "${PW_USER}${workflow_name}${job_number}" | sed 's|_||g' | sed 's|\.||g' | tr '[:upper:]' '[:lower:]' | tail -c 56)-pvc
          fi
          pvc_storage_class=${{ inputs.k8s.volumes.pvc_storage_class }}
          if [ -z "${pvc_storage_class}" ] || [[ "${pvc_storage_class}" == "undefined" ]]; then
            default_class=$(kubectl get storageclass -n ${{ inputs.k8s.namespace }} | grep '(default)')
            if [ $? -ne 0 ]; then
              echo "WARNING: Could not obtain default storageClass with command:"
              echo "         kubectl get storageclass -n ${{ inputs.k8s.namespace }}"
              echo "         You might need to provide a storage class input"
            elif [ -z "${default_class}" ]; then
              echo "ERROR: No default storage class found. You must specify one explicitly."
              exit 1
            fi
          else
            storageClassName="storageClassName: ${{ inputs.k8s.volumes.pvc_storage_class }}"
          fi
          echo "${pvc_name}" > pvc_name
          cat <<EOF > pvc.yaml
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ${pvc_name}
            namespace: ${{ inputs.k8s.namespace }}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: ${{ inputs.k8s.volumes.pvc_storage_size }}
            ${storageClassName}
          EOF
          cat pvc.yaml
      - name: Dry Run PVC
        early-cancel: any-job-failed
        if: ${{ inputs.resource.type == 'kubernetes' && inputs.k8s.volumes.pvc == New  }}
        run: |
          echo "Performing dry run..."
          kubectl apply -f pvc.yaml --dry-run=client
  prepare_k8s_deployment:
    if: ${{ always }}
    needs:
      - prepare_k8s_pvc
    steps:
      - name: Defining App Name
        early-cancel: any-job-failed
        if: ${{ inputs.resource.type == 'kubernetes' }}
        run: |
          job_number=$(pwd | rev | cut -d "/" -f1 | rev)
          workflow_name=$(pwd | rev | cut -d "/" -f2 | rev)
          app_name=$(echo "${PW_USER}${workflow_name}${job_number}" | sed 's|_||g' | sed 's|\.||g' | tr '[:upper:]' '[:lower:]' | tail -c 56)
          echo "app_name=${app_name}" | tee -a $OUTPUTS | tee -a OUTPUTS
      - name: Creating Deployment YAML
        early-cancel: any-job-failed
        if: ${{ inputs.resource.type == 'kubernetes' }}
        run: |
          if [[ "${{ inputs.k8s.resources.limits.select_gpu }}" == "Custom" ]]; then
            gpu_limits="${{ inputs.k8s.resources.limits.gpu_resource_key }}: ${{ inputs.k8s.resources.limits.number_of_gpus }}"
          elif [[ "${{ inputs.k8s.resources.limits.select_gpu }}" != "None" ]]; then
            gpu_limits="${{ inputs.k8s.resources.limits.select_gpu }}: ${{ inputs.k8s.resources.limits.number_of_gpus }}"
          fi
          # Attach RuntimeClass if it's available and using NVIDIA
          if ! [ -z "${gpu_limits}" ]; then
            if kubectl get runtimeclass nvidia &>/dev/null; then
              echo "nvidia RuntimeClass is available"
              runtimeClassName="runtimeClassName: nvidia"
            fi
          fi

          if [[ "${{ inputs.k8s.volumes.pvc }}" == "Existing" ]]; then
            pvc_name=${{ inputs.k8s.volumes.pvc_existing }}
          else
            pvc_name=$(cat pvc_name)
          fi

          cat <<EOF > app.yaml

          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ needs.prepare_k8s_deployment.outputs.app_name }}
            namespace: ${{ inputs.k8s.namespace }}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${{ needs.prepare_k8s_deployment.outputs.app_name }}
            template:
              metadata:
                labels:
                  app: ${{ needs.prepare_k8s_deployment.outputs.app_name }}
              spec:
                ${runtimeClassName}
                initContainers:
                  - name: set-permissions
                    image: busybox
                    command: ["sh", "-c", "chmod 777 ${{ inputs.k8s.volumes.pvc_mount_path }} -R"]
                    securityContext:
                      runAsUser: 0
                    resources:
                      requests:
                        memory: "${{ inputs.k8s.resources.requests.memory }}"
                        cpu: "${{ inputs.k8s.resources.requests.cpu }}"
                      limits:
                        memory: "${{ inputs.k8s.resources.limits.memory }}"
                        cpu: "${{ inputs.k8s.resources.limits.cpu }}"
                        ${gpu_limits}
                    volumeMounts:
                      - name: storage
                        mountPath: ${{ inputs.k8s.volumes.pvc_mount_path }}
                containers:
                  - name: ${{ needs.prepare_k8s_deployment.outputs.app_name }}
                    image: ${{ inputs.service_k8s.image }}
                    ports:
                      - containerPort: ${{ inputs.service_k8s.image_port }}
                    env:
                      - name: VNC_PW
                        value: ${{ inputs.service_k8s.password }}
                    securityContext:
                      capabilities:
                        add: ["NET_ADMIN"]  # Might be required depending on kasmvnc container usage
                    resources:
                      requests:
                        memory: "${{ inputs.k8s.resources.requests.memory }}"
                        cpu: "${{ inputs.k8s.resources.requests.cpu }}"
                      limits:
                        memory: "${{ inputs.k8s.resources.limits.memory }}"
                        cpu: "${{ inputs.k8s.resources.limits.cpu }}"
                        ${gpu_limits}
                    volumeMounts:
                      - name: storage
                        mountPath: ${{ inputs.k8s.volumes.pvc_mount_path }}
                  # Sidecar: the pw client dials out and exposes the service as an
                  # endpoint. The kasmweb image serves HTTPS on its port, so this
                  # uses `endpoints https` (not http).
                  - name: pw-endpoint
                    image: ghcr.io/parallelworks/pw-cli:v7.79.0
                    args:
                      - endpoints
                      - https
                      - --name
                      - kasmvnc-${PW_RUN_SLUG}
                      - --output
                      - text
                      - "${{ inputs.service_k8s.image_port }}"
                    env:
                      - name: PW_PLATFORM_HOST
                        value: "${PW_PLATFORM_HOST}"
                      - name: PW_API_KEY
                        valueFrom:
                          secretKeyRef:
                            name: ${{ needs.prepare_k8s_deployment.outputs.app_name }}-pw-api-key
                            key: PW_API_KEY
                    resources:
                      requests:
                        memory: "64Mi"
                        cpu: "50m"
                      limits:
                        memory: "256Mi"
                        cpu: "500m"
                volumes:
                  - name: storage
                    persistentVolumeClaim:
                      claimName: ${pvc_name}  # Assumes PVC name is provided as an input
          EOF
      - name: Dry Run Deployment
        early-cancel: any-job-failed
        if: ${{ inputs.resource.type == 'kubernetes' }}
        run: |
          echo "Performing dry run..."
          kubectl apply -f app.yaml --dry-run=client
  apply_k8s_deployment:
    if: ${{ inputs.resource.type == 'kubernetes' }}
    needs:
      - prepare_k8s_deployment
    steps:
      - name: Load outputs
        early-cancel: any-job-failed
        run: cat OUTPUTS >> $OUTPUTS
      - name: Apply PVC
        if: ${{  inputs.resource.type == 'kubernetes' && inputs.k8s.volumes.pvc == New }}
        run: kubectl apply -f pvc.yaml
        cleanup: |
          [[ "${DEBUG:-}" == "true" ]] && set -x
          if [[ "${{ inputs.k8s.volumes.pvc_persist }}" == "false" ]]; then
            MAX_ATTEMPTS=5
            ATTEMPT=1
            while true; do
              if kubectl delete -f pvc.yaml; then
                echo "PVC deleted successfully"
                touch pvc.deleted
                break
              elif [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
                echo "Failed to delete PVC after $MAX_ATTEMPTS attempts"
                exit 1
              else
                echo "Attempt $ATTEMPT to delete PVC failed. Retrying in 5 seconds..."
                sleep 5
                ((ATTEMPT++))
              fi
            done
          fi
      - name: Create API Key Secret
        early-cancel: any-job-failed
        run: |
          kubectl create secret generic ${{ needs.apply_k8s_deployment.outputs.app_name }}-pw-api-key \
            --namespace ${{ inputs.k8s.namespace }} \
            --from-literal=PW_API_KEY="${PW_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -
        cleanup: |
          kubectl delete secret ${{ needs.apply_k8s_deployment.outputs.app_name }}-pw-api-key \
            --namespace ${{ inputs.k8s.namespace }} --ignore-not-found
      - name: Apply Deployment
        run: kubectl apply -f app.yaml
        cleanup: |
          [[ "${DEBUG:-}" == "true" ]] && set -x
          MAX_ATTEMPTS=5
          ATTEMPT=1
          while true; do
            if kubectl delete -f app.yaml; then
              echo "Resources deleted successfully"
              touch app.deleted
              break
            elif [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
              echo "Failed to delete resources after $MAX_ATTEMPTS attempts"
              exit 1
            else
              echo "Attempt $ATTEMPT to delete resources failed. Retrying in 5 seconds..."
              sleep 5
              ((ATTEMPT++))
            fi
          done
      - name: Wait for Deployment to be Ready
        early-cancel: any-job-failed
        env:
          app_name: ${{ needs.apply_k8s_deployment.outputs.app_name }}
          namespace: ${{ inputs.k8s.namespace }}
        run: |

          log() {
            while true; do
              echo
              echo; echo "[INFO] $(date) - Checking deployment status for ${app_name} in namespace ${namespace}..."
              kubectl get deployment "${app_name}" -n "${namespace}" -o wide || echo "[WARN] Unable to get deployment"

              echo; echo "[INFO] $(date) - Pods status:"
              kubectl get pods -l app="${app_name}" -n "${namespace}" -o wide || echo "[WARN] Unable to get pods"

              pod_name=$(kubectl get pods -l app="${app_name}" -n "${namespace}" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
              if [[ -n "$pod_name" ]]; then
                echo; echo "[INFO] $(date) - Describing pod ${pod_name}..."
                kubectl describe pod "${pod_name}" -n "${namespace}" | grep -A20 "Events"
              fi

              echo "---------------------------------------------"
              sleep 10
            done
          }

          log &
          log_pid=$!
          trap "kill ${log_pid}" EXIT SIGINT SIGTERM
          [[ "${DEBUG:-}" == "true" ]] && set -x
          kubectl wait --for=condition=available --timeout=600s deployment/${app_name} -n ${namespace}
          exit_code=$?
          kubectl get deployment ${app_name} -n ${namespace} -o wide
          kubectl describe deployment ${app_name} -n ${namespace}
          exit ${exit_code}
      - name: Wait for Pod to be Ready
        early-cancel: any-job-failed
        env:
          app_name: ${{ needs.apply_k8s_deployment.outputs.app_name }}
          namespace: ${{ inputs.k8s.namespace }}
        run: |
          echo "Waiting for pod to be ready..."
          kubectl wait --for=condition=Ready pod -l app=${app_name} -n ${namespace} --timeout=600s
          pod=$(kubectl get pods -n ${namespace} -l app=${app_name} --field-selector=status.phase=Running -o jsonpath="{.items[0].metadata.name}")
          echo "pod=$pod" | tee -a $OUTPUTS | tee -a OUTPUTS
          touch pod.running
      - name: Stream Logs
        early-cancel: any-job-failed
        run: kubectl logs -f deployment/${{ needs.apply_k8s_deployment.outputs.app_name }} -n ${{ inputs.k8s.namespace }} --all-containers
  wait_for_endpoint_k8s:
    if: ${{ inputs.resource.type == 'kubernetes' }}
    needs:
      - prepare_k8s_deployment
    steps:
      - name: Wait until the Kubernetes deployment reaches its final stage
        early-cancel: any-job-failed
        run: |
          while true; do
            if [ -f "app.deleted" ]; then
              echo "File app.deleted was detected. Exiting..."
              exit 0
            elif [ -f "pod.running" ]; then
              echo "Pod is ready"
              break
            fi
            sleep 2
          done
      - name: Wait for endpoint
        early-cancel: any-job-failed
        run: |
          endpoint_name="kasmvnc-${PW_RUN_SLUG}"
          echo "::notice::Waiting for endpoint ${endpoint_name} to come online"
          until pw endpoints list | grep -qw "${endpoint_name}"; do
            echo "$(date) Endpoint ${endpoint_name} not found yet; retrying in 10 seconds"
            sleep 10
          done
          echo "::notice::Endpoint ${endpoint_name} is online"
          pw endpoints list | grep -w "${endpoint_name}"
'on':
  execute:
    inputs:
      resource:
        type: compute-resources
        label: Service host
        include-workspace: false
        tooltip: Resource to host the service
      container_runtime:
        type: string
        hidden: true
        default: kasmvnc-singularity
      cluster:
        hidden: ${{ inputs.resource.type == 'kubernetes' || inputs.resource.schedulerType == '' }}
        ignore: ${{ inputs.resource.type == 'kubernetes' || inputs.resource.schedulerType == '' }}
        type: group
        label: Compute Cluster Settings
        items:
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM enabled? Yes, unless the slurm section is hidden and ignored
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.resource }}
                tooltip: '--qos=partition slurm directive'
              time:
                label: Walltime
                type: string
                default: '01:00:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
                default: |
                  ##SBATCH --gres=gpu:4 # uncomment for gpus on onprem systems
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1
      desktop:
        type: group
        label: Desktop Settings
        collapsed: true
        hidden: ${{ inputs.resource.type == 'kubernetes' }}
        ignore: ${{ inputs.resource.type == 'kubernetes' }}
        items:
          kasmvnc_os:
            type: dropdown
            label: Operating System
            default: rocky9
            tooltip: Choose the operating system for the KasmVNC container
            options:
              - label: Rocky Linux 8
                value: rocky8
              - label: Rocky Linux 9
                value: rocky9
              - label: Ubuntu 22.04
                value: ubuntu
          startup_command:
            type: string
            label: Startup Application
            placeholder: firefox, virtuoso, etc.
            tooltip: Command to run after desktop starts (optional)
            optional: true
          container_mount_paths:
            type: editor
            label: Additional Mount Paths
            optional: true
            tooltip: |
              Extra directories to bind-mount into the container, one per line.
              Each path is mounted if it exists on the host; if it does not, a warning is logged and the path is skipped.
              Auto-mounted when present: /p/home, /p/work, /p/work1, /p/app, /p/cwfs, /scratch, /run/munge, /etc/pbs.conf, /var/spool/pbs, /opt/pbs
      k8s:
        type: group
        label: Kubernetes Settings
        hidden: ${{ inputs.resource.type != 'kubernetes' }}
        ignore: ${{ inputs.resource.type != 'kubernetes' }}
        items:
          namespace:
            label: Namespace
            type: kubernetes-namespaces
            clusterName: ${{ inputs.resource.name }}
            optional: ${{ inputs.resource.type != 'kubernetes' }}
          volumes:
            type: group
            label: Volumes
            collapsed: true
            tooltip: Specify storage settings for Persistent Volume Claims (PVCs), including size, storage class, and mount path.
            items:
              pvc:
                label: Persistent Volume Claim
                type: dropdown
                default: New
                options:
                  - value: Existing
                    label: Select Existing PVC
                  - value: New
                    label: Create New PVC
              pvc_mount_path:
                label: Mount Path
                type: string
                default: /mnt
              pvc_existing:
                label: Select PVC Name
                type: kubernetes-pvc
                clusterName: ${{ inputs.resource.name }}
                namespace: ${{ inputs.k8s.namespace }}
                hidden: ${{ inputs.k8s.volumes.pvc != Existing }}
                ignore: ${{ .hidden }}
                optional: ${{ .hidden }}
              pvc_storage_size:
                label: Enter PVC Size
                type: string
                hidden: ${{ inputs.k8s.volumes.pvc != New }}
                ignore: ${{ .hidden }}
                optional: ${{ .hidden }}
                default: 10Gi
              pvc_storage_class:
                label: Enter PVC Storage Class
                type: string
                hidden: ${{ inputs.k8s.volumes.pvc != New }}
                ignore: ${{ .hidden }}
                optional: true
                tooltip: Leave blank to use the default storage class configured in the cluster.
              pvc_persist:
                label: Persist PVC After Completion
                type: boolean
                default: false
                hidden: ${{ inputs.k8s.volumes.pvc != 'New' }}
                ignore: ${{ .hidden }}
                optional: ${{ .hidden }}
                tooltip: If true, the PVC will persist after the job is canceled or completed. If false, it will be deleted.
              pvc_name:
                label: Enter PVC Name
                type: string
                hidden: ${{ inputs.k8s.volumes.pvc_persist == false || inputs.k8s.volumes.pvc != New  }}
                ignore: ${{ .hidden }}
                optional: ${{ .hidden }}
          resources:
            type: group
            label: Resources
            collapsed: true
            tooltip: Configure CPU, memory, and GPU settings to define the computational resources allocated to the pod.
            items:
              requests:
                type: group
                label: Requests
                items:
                  memory:
                    label: Memory
                    type: string
                    default: 512Mi
                    tooltip: Specify the minimum memory required for the pod (e.g., 512Mi, 1Gi).
                  cpu:
                    label: CPU
                    type: string
                    default: '1'
                    tooltip: Specify the minimum CPU required for the pod (e.g., 0.5, 1, 100m). Use decimal values for partial CPUs or "m" for millicores (e.g., 100m = 0.1 CPU).
              limits:
                type: group
                label: Limits
                items:
                  memory:
                    label: Memory
                    type: string
                    default: 1Gi
                    tooltip: Set the maximum memory the pod can use (e.g., 1Gi, 2Gi).
                  cpu:
                    label: CPU
                    type: string
                    default: '2'
                    tooltip: Set the maximum CPU the pod can use (e.g., 1, 2, 500m).
                  select_gpu:
                    label: Select GPU Device
                    type: dropdown
                    default: None
                    tooltip: Choose the type of GPU device for the deployment, if needed. Select "None" for CPU-only workloads or "Custom" to specify a custom GPU resource key.
                    options:
                      - value: None
                        label: None
                      - value: nvidia.com/gpu
                        label: Nvidia GPU
                      - value: amd.com/gpu
                        label: AMD GPU
                      - value: cloud-tpus.google.com/v3
                        label: Google TPU
                      - value: Custom
                        label: Custom GPU Resource Key
                  gpu_resource_key:
                    label: Custom GPU Resource Key
                    type: string
                    hidden: ${{ inputs.k8s.resources.limits.select_gpu != Custom }}
                    ignore: ${{ .hidden }}
                    tooltip: |
                      Specify a custom GPU resource key for Kubernetes, such as:
                        - nvidia.com/gpu
                        - amd.com/gpu
                        - cloud-tpus.google.com/v3
                        - nvidia.com/mig-1g.5gb
                        - nvidia.com/mig-2g.10gb
                        - nvidia.com/mig-3g.20gb
                  number_of_gpus:
                    label: Number of GPUs
                    type: number
                    step: 1
                    default: 1
                    min: 1
                    tooltip: Specify the number of GPUs to allocate for the deployment.
                    hidden: ${{ inputs.k8s.resources.limits.select_gpu == None }}
                    ignore: ${{ .hidden }}

      service_k8s:
        type: group
        label: Service Settings
        hidden: ${{ inputs.resource.type != 'kubernetes' }}
        items:
          image:
            label: KasmVNC Image
            type: string
            default: kasmweb/desktop:1.16.0
            tooltip: Sample container from https://hub.docker.com/r/kasmweb/desktop
          image_port:
            label: KasmVNC Port
            type: number
            default: 6901
            tooltip: Define the port on which the KasmVNC runs inside the container. Default is 6901.
          password:
            label: Password
            type: password
            tooltip: Type in a password for user kasm_user
            optional: ${{ inputs.resource.type != 'kubernetes' }}
