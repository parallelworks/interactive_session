# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
---
permissions:
  - '*'

sessions:
  session:
    useTLS: false
    redirect: true

jobs:
  preprocessing:
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Checkout langflow-host
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - langflow-host
      - name: Create Inputs
        run: |
          set -x
          if [ -z "${PW_PLATFORM_HOST}" ]; then
            PW_PLATFORM_HOST=activate.hpc.mil
          fi
          PW_PLATFORM_HOST="${PW_PLATFORM_HOST#https://}"
          # Write PW variables
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          # Encase values between quotes
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          # Write input form variables and ensure the pw agent is in the PATH
          cat <<'EOF' >> inputs.sh
          basepath="/me/session/${PW_USER}/${{ sessions.session }}/"
          PATH=$HOME/pw:$PATH
          service_parent_install_dir="${{ inputs.service.parent_install_dir }}"
          service_langflow_data_dir="${{ inputs.service.langflow_data_dir }}"
          EOF

          # Remove empty variables
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh
          # Add export to all lines
          sed -i 's/^/export /' inputs.sh

  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/hsp.yaml
          session: ${{ sessions.session }}
          resource: ${{ inputs.cluster.resource }}
          cluster:
            scheduler: ${{ inputs.cluster.scheduler }}
            slurm:
              is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
              account: ${{ inputs.cluster.slurm.account }}
              partition: ${{ inputs.cluster.slurm.partition }}
              qos: ${{ inputs.cluster.slurm.qos }}
              cpus_per_task: ${{ inputs.cluster.slurm.cpus_per_task }}
              nodes: ${{ inputs.cluster.slurm.nodes }}
              gpus: ${{ inputs.cluster.slurm.gpus }}
              node_type: ${{ inputs.cluster.slurm.node_type }}
              scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
              time: ${{ inputs.cluster.slurm.time }}
            pbs:
              is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
              account: ${{ inputs.cluster.pbs.account }}
              scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/langflow-host/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/langflow-host/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/inputs.sh
            slug: ""
            rundir: ${PW_PARENT_JOB_DIR}

'on':
  execute:
    inputs:
      cluster:
        type: group
        label: Compute Cluster Settings
        items:
          resource:
            type: compute-clusters
            label: Service host
            include-workspace: false
            tooltip: Resource to host the Langflow service
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            hidden: ${{ inputs.cluster.resource.schedulerType == '' }}
            ignore: ${{ .hidden }}
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
              account:
                label: SLURM account
                type: slurm-accounts
                resource: ${{ inputs.cluster.resource }}
                tooltip: '--account=value slurm directive'
                ignore: ${{ 'existing' != inputs.cluster.resource.provider }}
                hidden: ${{ .ignore }}
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.cluster.resource }}
                tooltip: Select a partition from the drop down menu.
              qos:
                label: Quality of Service [QoS]
                type: slurm-qos
                resource: ${{ inputs.cluster.resource }}
                tooltip: '--qos=value slurm directive'
                ignore: ${{ 'existing' != inputs.cluster.resource.provider }}
                hidden: ${{ .ignore }}
              cpus_per_task:
                label: CPUs per task
                type: number
                default: 1
                tooltip: '--cpus-per-task= SLURM directive to set the number of CPUs per task'
                ignore: ${{ 'existing' != inputs.cluster.resource.provider }}
                hidden: ${{ .ignore }}
              nodes:
                label: Number of nodes
                type: number
                default: 1
                tooltip: '--nodes=value slurm directive'
                ignore: ${{ 'existing' != inputs.cluster.resource.provider }}
                hidden: ${{ .ignore }}
              gpus:
                label: Number of GPUs
                type: number
                default: 0
                tooltip: '--gres=gpu:value slurm directive'
                ignore: ${{ 'existing' != inputs.cluster.resource.provider }}
                hidden: ${{ .ignore }}
              node_type:
                label: Node Type
                type: dropdown
                optional: true
                default: ""
                option-key: ${{ inputs.cluster.resource.name }}
                tooltip: '--constraint=<value> slurm directive'
                ignore: ${{ 'existing' != inputs.cluster.resource.provider || (inputs.cluster.resource.name != 'blueback' && inputs.cluster.resource.name != 'narwhal' && inputs.cluster.resource.name != 'nautilus' && inputs.cluster.resource.name != 'raider' && inputs.cluster.resource.name != 'crux') }}
                hidden: ${{ .ignore }}
                options:
                  blueback:
                    - standard
                    - bigmem
                    - mla
                    - viz
                    - transfer
                  narwhal:
                    - standard
                    - bigmem
                    - mla
                    - smla
                    - dmla
                    - viz
                    - transfer
                  nautilus:
                    - standard
                    - highclock
                    - bigmem
                    - mla
                    - viz
                    - transfer
                  raider:
                    - standard
                    - highclock
                    - bigmem
                    - mla
                    - viz
                    - transfer
                  crux:
                    - AMD
                    - Intel
              time:
                label: Walltime
                type: string
                default: '00:30:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job (format: D-HH:MM:SS or HH:MM:SS, e.g. 7-00:00:00 or 01:00:00)'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
                default: |
                  ##SBATCH --constraint=mla # uncomment for Navy and AFRL DSRC systems
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              account:
                label: Account
                type: string
                tooltip: PBS account for job submission (-A)
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1
                default: |
                  # Parameters that apply to all sites
                  #PBS -l walltime=00:30:00
                  #PBS -V
                  #PBS -q standard
                  # Remove first # to activate specific lines
                  #=====Ruth (Lustre, only vis has NVIDIA)=====
                  ##PBS -l select=1:ncpus=128:mpiprocs=128:ngpus=1
                  #=====Warhawk (Lustre)====
                  ##PBS -l select=1:ncpus=128:mpiprocs=128:ngpus=2
                  #=====Wheat (WEKA, nmlas=4|6)====
                  ##PBS -l select=1:ncpus=92:mpiprocs=92:nmlas=4

      service:
        type: group
        label: Langflow Settings
        collapsed: true
        items:
          parent_install_dir:
            label: Install Directory
            type: string
            default: ${HOME}/pw/software
            tooltip: Directory where Langflow and its Python environment are installed. Shared across sessions on the same cluster.
          langflow_data_dir:
            label: Langflow Data Directory
            type: string
            default: ${HOME}/pw/.langflow
            tooltip: Directory where Langflow stores its database, flows, and credentials. Persists between sessions if on a shared filesystem.
