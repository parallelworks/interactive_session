# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
permissions:
  - '*'

sessions:
  session:
    useTLS: false
    redirect: true

jobs:
  preprocessing:
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Checkout langflow-singularity
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - langflow-singularity
            - tools/oras
      - name: Create Inputs
        run: |
          set -x
          # Write PW variables
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          # Encase values between quotes
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          # Write input form variables and ensure the pw agent is in the PATH
          cat <<'EOF' >> inputs.sh
          basepath="/me/session/${PW_USER}/${{ sessions.session }}/"
          PATH=$HOME/pw:$PATH
          service_parent_install_dir="${{ inputs.service.parent_install_dir }}"
          service_langflow_data_dir="${{ inputs.service.langflow_data_dir }}"
          service_langflow_config_dir="${{ inputs.service.langflow_config_dir }}"
          service_langflow_components_path="${{ inputs.service.langflow_components_path }}"
          service_langflow_database_url="${{ inputs.service.langflow_database_url }}"
          EOF

          # Remove empty variables
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh
          # Add export to all lines
          sed -i 's/^/export /' inputs.sh

  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/general.yaml
          session: ${{ sessions.session }}
          resource: ${{ inputs.cluster.resource }}
          cluster:
            scheduler: ${{ inputs.cluster.scheduler }}
            slurm:
              is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
              partition: ${{ inputs.cluster.slurm.partition }}
              scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
              time: ${{ inputs.cluster.slurm.time }}
            pbs:
              is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
              scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/langflow-singularity/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/langflow-singularity/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/inputs.sh
            slug: ""
            rundir: ${PW_PARENT_JOB_DIR}
        cleanup: |
          set -x
          if [ -d tools/oras ]; then
            echo "Removing tools/oras"
            rm -rf tools/oras
          fi

'on':
  execute:
    inputs:
      cluster:
        type: group
        label: Compute Cluster Settings
        items:
          resource:
            type: compute-clusters
            label: Service host
            include-workspace: false
            tooltip: Resource to host the Langflow service
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            hidden: ${{ inputs.cluster.resource.schedulerType == '' }}
            ignore: ${{ .hidden }}
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.cluster.resource }}
                tooltip: Select a partition from the drop down menu.
              time:
                label: Walltime
                type: string
                default: '01:00:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1

      service:
        type: group
        label: Langflow Settings
        collapsed: true
        items:
          parent_install_dir:
            label: Install Directory
            type: string
            default: ${HOME}/pw/software
            tooltip: Directory where the Langflow Singularity container is stored. Shared across sessions on the same cluster.
          langflow_data_dir:
            label: Langflow Data Directory
            type: string
            default: ${HOME}/pw/.langflow
            tooltip: Directory where Langflow stores flows and credentials. Persists between sessions if on a shared filesystem.
          langflow_config_dir:
            label: Config Directory
            type: string
            optional: true
            default: ${HOME}/pw/.langflow
            tooltip: |
              LANGFLOW_CONFIG_DIR inside the container. Components placed under
              <config_dir>/components/ are auto-discovered at startup — ideal for
              personal components stored alongside your flows and data.
              Defaults to the same location as the data directory.
          langflow_components_path:
            label: Custom Components Path
            type: string
            optional: true
            tooltip: |
              LANGFLOW_COMPONENTS_PATH — points to any directory outside the config
              dir, e.g. a git-managed repo or a shared team folder on the cluster.
              The path is bind-mounted into the container.
              Use this when components are version-controlled or shared across users;
              use Config Directory/components/ for personal components instead.
              Leave empty to use built-in components only.
          langflow_database_url:
            label: Database URL
            type: string
            optional: true
            default: sqlite:////${HOME}/pw/.langflow/langflow.db
            tooltip: |
              LANGFLOW_DATABASE_URL for Langflow (SQLite or PostgreSQL).
              For SQLite use: sqlite:////absolute/path/to/langflow.db
              The database directory is bind-mounted automatically.
              Defaults to a persistent SQLite file in the home directory.
