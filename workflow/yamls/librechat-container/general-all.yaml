permissions:
  - '*'
env:
  PW_API_KEY: ${PW_API_KEY}
  GENAI_MIL_API_KEY: ${{ inputs.env.GENAI_MIL_API_KEY }}
  JWT_SECRET: ${{ inputs.env.JWT_SECRET }}
  JWT_REFRESH_SECRET: ${{ inputs.env.JWT_REFRESH_SECRET }}
  LIBRECHAT_API_KEY: ${{ inputs.env.LIBRECHAT_API_KEY }}
  LANGFLOW_API_KEY: ${{ inputs.env.LANGFLOW_API_KEY }}
  service_parent_install_dir: /home/alvaro/pw/software

sessions:
  librechat:
    redirect: true
  manager:
    redirect: false
  langflow:
    useTLS: false
    redirect: false


jobs:
  github_checkout:
    steps:
      - name: Librechat and Langflow Checkout
        if: ${{ inputs.librechat_resource.ip == inputs.langflow_resource.ip }}
        ssh:
          remoteHost: ${{ inputs.librechat_resource.ip }}
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          # Dev branch carrying the Langflow-proxy scripts. Flip back to `main`
          # once librechat-all is merged.
          branch: librechat-all-v4
          sparse_checkout:
            - ${{ inputs.container_runtime }}
            - tools/oras
            - librechat-singularity-manager
            - langflow-singularity
      - name: Librechat Checkout
        if: ${{ inputs.librechat_resource.ip != inputs.langflow_resource.ip }}
        ssh:
          remoteHost: ${{ inputs.librechat_resource.ip }}
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          # Dev branch carrying the Langflow-proxy scripts. Flip back to `main`
          # once librechat-all is merged.
          branch: librechat-all-v4
          sparse_checkout:
            - ${{ inputs.container_runtime }}
            - tools/oras
            - librechat-singularity-manager
      - name: Langflow Checkout
        if: ${{ inputs.librechat_resource.ip != inputs.langflow_resource.ip }}
        ssh:
          remoteHost: ${{ inputs.langflow_resource.ip }}
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          # Dev branch carrying the Langflow-proxy scripts. Flip back to `main`
          # once librechat-all is merged.
          branch: librechat-all-v4
          sparse_checkout:
            - tools/oras
            - langflow-singularity
  
  librechat_preprocessing:
    needs:
      - github_checkout
    working-directory: ${PW_PARENT_JOB_DIR}/librechat
    ssh:
      remoteHost: ${{ inputs.librechat_resource.ip }}
    steps:
      - name: Create Inputs
        run: |
          set -x
          if [ -z "${PW_PLATFORM_HOST}" ]; then
            PW_PLATFORM_HOST=activate.hpc.mil
          fi
          PW_PLATFORM_HOST="${PW_PLATFORM_HOST#https://}"
          # Write PW variables
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          # Encase values between quotes
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          # Password
          password=$(openssl rand -base64 12 | head -c 12)
          # basepath
          basepath=/me/session/${PW_USER}/${{ sessions.librechat }}
          # Write input form variables and ensure the pw agent is in the PATH
          cat <<'EOF' >> inputs.sh
          PATH=$HOME/pw:$PATH
          librechat_dir="${{ inputs.librechat.dir }}"
          domain_client="${{ inputs.librechat.domain_client }}"
          librechat_db="${{ inputs.librechat.db }}"
          librechat_config="${{ inputs.librechat.config }}"
          langflow_enable_proxy="${{ inputs.langflow.enable_proxy }}"
          langflow_proxy_dir="${{ inputs.langflow.proxy_dir }}"
          langflow_resource_name="${{ inputs.langflow_resource.name }}"
          librechat_resource_name="${{ inputs.librechat_resource.name }}"
          langflow_same_host="${{ inputs.librechat_resource.ip == inputs.langflow_resource.ip }}"
          EOF
          echo basepath=${basepath} >> inputs.sh
          echo password=${password} >> inputs.sh
          # Remove empty variables
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh # remove var=""
          # Add export= to all lines
          sed -i 's/^/export /' inputs.sh
      - name: Lock librechat_dir
        run: |
          set -e
          source inputs.sh
          _dir="${librechat_dir:-${HOME}/pw/LibreChat}"
          _lock="${_dir}/.librechat.lock"
          mkdir -p "$_dir"
          if [ -f "$_lock" ]; then
            echo "::error title=Directory In Use::librechat_dir ${_dir} is already in use by another session: $(cat $_lock). Stop that session first, or set a different librechat_dir in LibreChat Settings."
            exit 1
          fi
          echo "job=${PW_JOB_ID:-unknown} user=${PW_USER:-unknown} started=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "$_lock"
          echo "::notice::librechat_dir lock created at $_lock"
  librechat_session_runner:
    working-directory: ${PW_PARENT_JOB_DIR}/librechat
    needs:
      - librechat_preprocessing
    ssh:
      remoteHost: ${{ inputs.librechat_resource.ip }}
    steps:
      - name: Librechat Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/general.yaml
          session: ${{ sessions.librechat }}
          resource: ${{ inputs.librechat_resource }}
          cluster:
            scheduler: ${{ inputs.librechat_cluster.scheduler }}
            slurm:
              is_enabled: ${{ inputs.librechat_cluster.slurm.is_enabled }}
              partition: ${{ inputs.librechat_cluster.slurm.partition }}
              scheduler_directives: ${{ inputs.librechat_cluster.slurm.scheduler_directives }}
              time: ${{ inputs.librechat_cluster.slurm.time }}
            pbs:
              is_enabled: ${{ inputs.librechat_cluster.pbs.is_enabled }}
              scheduler_directives: ${{ inputs.librechat_cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/${{ inputs.container_runtime }}/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/${{ inputs.container_runtime }}/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/librechat/inputs.sh
            slug: login
            rundir: ${PW_PARENT_JOB_DIR}/librechat
        cleanup: |
          set -x
          if [ -d tools/oras ]; then
            echo "Removing tools/oras"
            rm -rf tools/oras
          fi
          source inputs.sh 2>/dev/null || true
          rm -f "${librechat_dir:-${HOME}/pw/LibreChat}/.librechat.lock" \
            && echo "::notice::librechat_dir lock removed" || true
  manager_preprocessing:
    needs:
      - github_checkout
    working-directory: ${PW_PARENT_JOB_DIR}/manager
    ssh:
      remoteHost: ${{ inputs.librechat_resource.ip }}
    steps:
      - name: Create Inputs
        run: |
          set -x
          if [ -z "${PW_PLATFORM_HOST}" ]; then
            PW_PLATFORM_HOST=activate.hpc.mil
          fi
          PW_PLATFORM_HOST="${PW_PLATFORM_HOST#https://}"
          # Write PW variables
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          # Encase values between quotes
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          # Write input form variables
          cat <<'EOF' >> inputs.sh
          basepath="/me/session/${PW_USER}/${{ sessions.manager }}/"
          PATH=$HOME/pw:$PATH
          librechat_dir="${{ inputs.librechat.dir }}"
          resource_uri="${{ inputs.librechat_resource.uri }}"
          librechat_job_dir="${PW_PARENT_JOB_DIR}/librechat"
          scheduler="${{ inputs.librechat_cluster.scheduler }}"
          EOF
          # Remove empty variables
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh
          # Add export to all lines
          sed -i 's/^/export /' inputs.sh
  manager_session_runner:
    working-directory: ${PW_PARENT_JOB_DIR}/manager
    needs:
      - manager_preprocessing
    ssh:
      remoteHost: ${{ inputs.librechat_resource.ip }}
    steps:
      - name: Manager Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/general.yaml
          session: ${{ sessions.manager }}
          resource: ${{ inputs.librechat_resource }}
          cluster:
            scheduler: ${{ inputs.librechat_cluster.scheduler }}
            slurm:
              is_enabled: ${{ inputs.librechat_cluster.slurm.is_enabled }}
              partition: ${{ inputs.librechat_cluster.slurm.partition }}
              scheduler_directives: ${{ inputs.librechat_cluster.slurm.scheduler_directives }}
              time: ${{ inputs.librechat_cluster.slurm.time }}
            pbs:
              is_enabled: ${{ inputs.librechat_cluster.pbs.is_enabled }}
              scheduler_directives: ${{ inputs.librechat_cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/librechat-singularity-manager/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/librechat-singularity-manager/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/manager/inputs.sh
            slug: /
            rundir: ${PW_PARENT_JOB_DIR}/manager


  langflow_preprocessing:
    needs:
      - github_checkout
    working-directory: ${PW_PARENT_JOB_DIR}/langflow
    ssh:
      remoteHost: ${{ inputs.langflow_resource.ip }}
    steps:
      - name: Create Inputs
        run: |
          set -x
          if [ -z "${PW_PLATFORM_HOST}" ]; then
            PW_PLATFORM_HOST=activate.hpc.mil
          fi
          PW_PLATFORM_HOST="${PW_PLATFORM_HOST#https://}"
          # Write PW variables
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          # Encase values between quotes
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          # Write input form variables and ensure the pw agent is in the PATH
          cat <<'EOF' >> inputs.sh
          basepath="/me/session/${PW_USER}/${{ sessions.langflow }}/"
          PATH=$HOME/pw:$PATH
          service_langflow_data_dir="${{ inputs.langflow.data_dir }}"
          service_langflow_config_dir="${{ inputs.langflow.config_dir }}"
          service_langflow_components_path="${{ inputs.langflow.components_path }}"
          service_langflow_database_url="${{ inputs.langflow.database_url }}"
          langflow_enable_proxy="${{ inputs.langflow.enable_proxy }}"
          langflow_proxy_dir="${{ inputs.langflow.proxy_dir }}"
          langflow_proxy_flows_file="${{ inputs.langflow.proxy_flows_file }}"
          EOF

          # Remove empty variables
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh
          # Add export to all lines
          sed -i 's/^/export /' inputs.sh

  langflow_session_runner:
    working-directory: ${PW_PARENT_JOB_DIR}/langflow
    needs:
      - langflow_preprocessing
    ssh:
      remoteHost: ${{ inputs.langflow_resource.ip }}
    steps:
      - name: Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/general.yaml
          session: ${{ sessions.langflow }}
          resource: ${{ inputs.langflow_resource }}
          cluster:
            scheduler: ${{ inputs.langflow_cluster.scheduler }}
            slurm:
              is_enabled: ${{ inputs.langflow_cluster.slurm.is_enabled }}
              partition: ${{ inputs.langflow_cluster.slurm.partition }}
              scheduler_directives: ${{ inputs.langflow_cluster.slurm.scheduler_directives }}
              time: ${{ inputs.langflow_cluster.slurm.time }}
            pbs:
              is_enabled: ${{ inputs.langflow_cluster.pbs.is_enabled }}
              scheduler_directives: ${{ inputs.langflow_cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/langflow-singularity/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/langflow-singularity/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/langflow/inputs.sh
            slug: ""
            rundir: ${PW_PARENT_JOB_DIR}/langflow

'on':
  execute:
    inputs:
      librechat_resource:
        type: compute-clusters
        label: LibreChat host
        include-workspace: false
        tooltip: Resource to host the service
      langflow_resource:
        type: compute-clusters
        label: Langflow host
        include-workspace: false
        tooltip: Resource to host the service
      container_runtime:
        type: dropdown
        label: Run container using
        default: librechat-singularity
        hidden: true
        tooltip: Select which container runtime will be used to launch the LibreChat containers (e.g., Docker or Singularity).
        options:
          - label: Docker
            value: librechat-docker
          - label: Singularity
            value: librechat-singularity
      librechat_cluster:
        hidden: ${{ inputs.librechat_resource.schedulerType == '' }}
        ignore: ${{ inputs.librechat_resource.schedulerType == '' }}
        type: group
        label: Librechat Cluster Settings
        items:
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.librechat_resource.schedulerType != 'slurm' || inputs.librechat_cluster.scheduler == false }}
            ignore: ${{ inputs.librechat_resource.schedulerType != 'slurm' || inputs.librechat_cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM enabled? Yes, unless the slurm section is hidden and ignored
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.librechat_resource }}
                tooltip: '--qos=partition slurm directive'
              time:
                label: Walltime
                type: string
                default: '00:30:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job (format: D-HH:MM:SS or HH:MM:SS, e.g. 7-00:00:00 or 01:00:00)'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
                default: |
                  ##SBATCH --constraint=mla # uncomment for Navy and AFRL DSRC systems
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.librechat_resource.schedulerType != 'pbs' || inputs.librechat_cluster.scheduler == false }}
            ignore: ${{ inputs.librechat_resource.schedulerType != 'pbs' || inputs.librechat_cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1
                default: |
                  # Parameters that apply to all sites
                  #PBS -l walltime=00:30:00
                  #PBS -V
                  #PBS -q standard
                  # Remove first # to activate specific lines
                  #=====Ruth (Lustre, only vis has NVIDIA)=====
                  ##PBS -l select=1:ncpus=128:mpiprocs=128:ngpus=1
                  #=====Warhawk (Lustre)====
                  ##PBS -l select=1:ncpus=128:mpiprocs=128:ngpus=2
                  #=====Wheat (WEKA, nmlas=4|6)====
                  ##PBS -l select=1:ncpus=92:mpiprocs=92:nmlas=4
      langflow_cluster:
        hidden: ${{ inputs.langflow_resource.schedulerType == '' }}
        ignore: ${{ inputs.langflow_resource.schedulerType == '' }}
        type: group
        label: Langflow Cluster Settings
        items:
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.langflow_resource.schedulerType != 'slurm' || inputs.langflow_cluster.scheduler == false }}
            ignore: ${{ inputs.langflow_resource.schedulerType != 'slurm' || inputs.langflow_cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM enabled? Yes, unless the slurm section is hidden and ignored
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.langflow_resource }}
                tooltip: '--qos=partition slurm directive'
              time:
                label: Walltime
                type: string
                default: '00:30:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job (format: D-HH:MM:SS or HH:MM:SS, e.g. 7-00:00:00 or 01:00:00)'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
                default: |
                  ##SBATCH --constraint=mla # uncomment for Navy and AFRL DSRC systems
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.langflow_resource.schedulerType != 'pbs' || inputs.langflow_cluster.scheduler == false }}
            ignore: ${{ inputs.langflow_resource.schedulerType != 'pbs' || inputs.langflow_cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1
                default: |
                  # Parameters that apply to all sites
                  #PBS -l walltime=00:30:00
                  #PBS -V
                  #PBS -q standard
                  # Remove first # to activate specific lines
                  #=====Ruth (Lustre, only vis has NVIDIA)=====
                  ##PBS -l select=1:ncpus=128:mpiprocs=128:ngpus=1
                  #=====Warhawk (Lustre)====
                  ##PBS -l select=1:ncpus=128:mpiprocs=128:ngpus=2
                  #=====Wheat (WEKA, nmlas=4|6)====
                  ##PBS -l select=1:ncpus=92:mpiprocs=92:nmlas=4
      librechat:
        type: group
        label: LibreChat Settings
        collapsed: true
        items:
          dir:
            type: string
            label: LibreChat directory
            default: ${HOME}/pw/LibreChat
            tooltip: Path where the LibreChat repository is cloned. Defaults to a shared location so chat history and uploads persist across sessions.
          config:
            type: string
            label: LibreChat config file
            optional: true
            tooltip: Path to the LibreChat YAML configuration file. Defaults to the standard location inside the LibreChat directory.
          db:
            type: string
            label: LibreChat Database Directory
            optional: true
            tooltip: Path to the directory where MongoDB stores its data. Defaults to the standard location inside the LibreChat directory.
          domain_client:
            type: dropdown
            label: Domain Client
            default: ACTIVATE
            tooltip: Select ACTIVATE if LibreChat will be accessed from the Activate platform, or LOCALHOST otherwise (e.g., accessed via localhost or through an SSH tunnel).
            options:
              - label: ACTIVATE
                value: ACTIVATE
              - label: LOCALHOST
                value: LOCALHOST
      langflow:
        type: group
        label: Langflow Settings
        collapsed: true
        items:
          data_dir:
            label: Langflow Data Directory
            type: string
            default: ${HOME}/pw/.langflow
            tooltip: Directory where Langflow stores flows and credentials. Persists between sessions if on a shared filesystem.
          config_dir:
            label: Config Directory
            type: string
            optional: true
            default: ${HOME}/pw/.langflow
            tooltip: |
              LANGFLOW_CONFIG_DIR inside the container. Components placed under
              <config_dir>/components/ are auto-discovered at startup — ideal for
              personal components stored alongside your flows and data.
              Defaults to the same location as the data directory.
          components_path:
            label: Custom Components Path
            type: string
            optional: true
            tooltip: |
              LANGFLOW_COMPONENTS_PATH — points to any directory outside the config
              dir, e.g. a git-managed repo or a shared team folder on the cluster.
              The path is bind-mounted into the container.
              Use this when components are version-controlled or shared across users;
              use Config Directory/components/ for personal components instead.
              Leave empty to use built-in components only.
          database_url:
            label: Database URL
            type: string
            default: sqlite:////${HOME}/pw/.langflow/langflow.db
            tooltip: |
              LANGFLOW_DATABASE_URL for Langflow (SQLite or PostgreSQL).
              For SQLite use: sqlite:////absolute/path/to/langflow.db
              The database directory is bind-mounted automatically.
              Defaults to a persistent SQLite file in the home directory.
          enable_proxy:
            label: Start Langflow Proxy?
            type: boolean
            hidden: true
            default: true
            tooltip: |
              Master switch for the OpenAI-compatible Langflow proxy that exposes
              each Langflow flow as a model in LibreChat. true (default) starts it
              (also requires Langflow Proxy Path). false or empty runs the plain
              Langflow + LibreChat workflow — no proxy, no flow auto-import, and no
              LibreChat "Langflow" endpoint.
          proxy_dir:
            label: Langflow Proxy Path
            type: string
            tooltip: |
              Path on the service host to the langflow_proxy code (the directory
              that contains the 'langflow_proxy/' Python package). Required when
              Start Langflow Proxy? is true. An OpenAI-compatible proxy is launched
              alongside Langflow (on a port allocated at runtime) and registered in
              LibreChat as the "Langflow" endpoint, exposing each Langflow flow as a
              selectable model. Flow JSONs in <Langflow Proxy Path>/flows are
              auto-imported into Langflow on startup (owned by the superuser).
              NOTE: assumes Langflow and LibreChat share the service host
              (Schedule Job? = No), so LibreChat can reach the proxy on localhost.
          proxy_flows_file:
            label: Proxy Flow Configs File
            type: string
            optional: true
            tooltip: |
              Optional path to a YAML file containing a top-level 'flows:' block
              with per-flow model routing for the proxy, e.g.:
                flows:
                  chatbot:
                    model_configs:
                      general: { provider: "GenAI.mil", model: "gemini-3.1-pro-preview" }
              If empty, 'flows.yaml' next to the proxy code is used when present;
              otherwise all flows are exposed with default settings.

      env:
        type: group
        label: Environment Variables
        collapsed: true
        items:
          GENAI_MIL_API_KEY:
            type: password
            label: GENAI MIL API Key
            default: ''
          JWT_SECRET:
            type: password
            label: JWT Secret
            default: ''
          JWT_REFRESH_SECRET:
            type: password
            label: JWT Refresh Secret
            default: ''
          LIBRECHAT_API_KEY:
            type: password
            label: LibreChat API Key
            default: ''
          LANGFLOW_API_KEY:
            type: password
            label: Langflow API Key
            default: ''
