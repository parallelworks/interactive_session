# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
permissions:
  - '*'

# The v4 form named this group `env`, which together with this top-level env:
# block trips the expression parser on CLI runs; v5 renames it to env_vars.
env:
  PW_API_KEY: ${PW_API_KEY}
  JWT_SECRET: ${{ inputs.env_vars.JWT_SECRET }}
  JWT_REFRESH_SECRET: ${{ inputs.env_vars.JWT_REFRESH_SECRET }}
  LIBRECHAT_API_KEY: ${{ inputs.env_vars.LIBRECHAT_API_KEY }}
  LANGFLOW_API_KEY: ${{ inputs.env_vars.LANGFLOW_API_KEY }}

jobs:
  preprocessing:
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Checkout ${{ inputs.container_runtime }}
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: librechat-endpoints
          sparse_checkout:
            - ${{ inputs.container_runtime }}
            - tools/oras
      - name: Create Inputs
        run: |
          set -x

          if [ -z "${PW_PLATFORM_HOST}" ]; then
            echo "$(date) PW_PLATFORM_HOST is unset"
            exit 1
          fi
          PW_PLATFORM_HOST="${PW_PLATFORM_HOST#https://}"
          # Write PW variables
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          # Encase values between quotes
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          # Password
          password=$(openssl rand -base64 12 | head -c 12)
          # Write input form variables and ensure the pw agent is in the PATH
          cat <<'EOF' >> inputs.sh
          PATH=$HOME/pw:$PATH
          librechat_dir="${{ inputs.service.librechat_dir }}"
          domain_client="${{ inputs.service.domain_client }}"
          librechat_db="${{ inputs.service.librechat_db }}"
          librechat_config="${{ inputs.service.librechat_config }}"
          pw_endpoints_args="--name librechat-${PW_RUN_SLUG} --slug login"
          EOF
          echo password=${password} >> inputs.sh
          # Remove empty variables
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh # remove var=""
          # Add export= to all lines
          sed -i 's/^/export /' inputs.sh
      - name: Lock librechat_dir
        run: |
          set -e
          source inputs.sh
          _dir="${librechat_dir:-${HOME}/pw/LibreChat}"
          _lock="${_dir}/.librechat.lock"
          mkdir -p "$_dir"
          if [ -f "$_lock" ]; then
            echo "::error title=Directory In Use::librechat_dir ${_dir} is already in use by another session: $(cat $_lock). Stop that session first, or set a different librechat_dir in LibreChat Settings."
            exit 1
          fi
          echo "job=${PW_JOB_ID:-unknown} user=${PW_USER:-unknown} started=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "$_lock"
          echo "::notice::librechat_dir lock created at $_lock"
      - name: Controller Preprocessing
        run: |
          set -x
          # This script prepares the target host and always runs in the controller node
          cp inputs.sh controller-${PW_JOB_ID}.sh
          cat ${{ inputs.container_runtime }}/controller-v4.sh >> controller-${PW_JOB_ID}.sh
          bash controller-${PW_JOB_ID}.sh
      - name: Create Service Script
        run: |
          rm -f HOSTNAME SESSION_PORT job.ended job.started
          # This script starts the service
          cp inputs.sh start-service-${PW_JOB_ID}.sh

          # Write code common to all services
          cat <<'EOF' >> start-service-${PW_JOB_ID}.sh

          cleanup() {
              trap - EXIT INT TERM HUP QUIT USR1 USR2 PIPE
              echo "::notice::Cleaning up..."
              if [ -f cancel.sh ]; then
                  mv cancel.sh cancel.sh.submitted
                  echo "echo Cleanup script was already executed" > cancel.sh
                  bash cancel.sh.submitted
              fi
              kill -- -$$
          }

          trap cleanup EXIT INT TERM HUP QUIT USR1 USR2 PIPE

          echo "::notice::Starting service"
          EOF
          cat ${{ inputs.container_runtime }}/start-template-v4.sh >> ./start-service-${PW_JOB_ID}.sh
          echo "SCRIPT_PATH=${PWD}/start-service-${PW_JOB_ID}.sh" | tee -a $OUTPUTS
          echo "SKIP_CLEANUP_PATH=${PWD}/SKIP_CLEANUP" | tee -a $OUTPUTS

  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/script_submitter/v3.6/general.yaml
          resource: ${{ inputs.resource }}
          shebang: '#!/bin/bash'
          use_existing_script: true
          script_path: ${{ needs.preprocessing.outputs.SCRIPT_PATH }}
          define_cleanup_script: true
          cleanup_script_path: ./cancel.sh
          scheduler: ${{ inputs.cluster.scheduler }}
          use_scheduler_agent: false
          submit_and_exit: false
          skip_cleanups_file: ${{ needs.preprocessing.outputs.SKIP_CLEANUP_PATH }}
          slurm:
            is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
            partition: ${{ inputs.cluster.slurm.partition }}
            scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
            time: ${{ inputs.cluster.slurm.time }}
          pbs:
            is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
            scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}
        cleanup: |
          set -x
          # After the endpoint is up the service owns the lock (cancel.sh removes
          # it at teardown); this cleanup only covers failure/cancel before that.
          if [ -f "${{ needs.preprocessing.outputs.SKIP_CLEANUP_PATH }}" ]; then
            echo "::notice::Endpoint is up — lock is owned by the service now"
            exit 0
          fi
          source inputs.sh 2>/dev/null || true
          rm -f "${librechat_dir:-${HOME}/pw/LibreChat}/.librechat.lock" \
            && echo "::notice::librechat_dir lock removed" || true

  wait_for_endpoint:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Wait for endpoint
        early-cancel: any-job-failed
        run: |
          endpoint_name="librechat-${PW_RUN_SLUG}"
          echo "::notice::Waiting for endpoint ${endpoint_name} to come online"
          until pw endpoints list | grep -qw "${endpoint_name}"; do
            echo "$(date) Endpoint ${endpoint_name} not found yet; retrying in 10 seconds"
            sleep 10
          done
          echo "::notice::Endpoint ${endpoint_name} is online"
          touch ${{ needs.preprocessing.outputs.SKIP_CLEANUP_PATH }}
          sleep 2
      - name: Cancel Script Submitter
        uses: parallelworks/cancel-jobs
        with:
          jobs:
            - session_runner

'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: Service host
        include-workspace: false
        tooltip: Resource to host the service
      container_runtime:
        type: dropdown
        label: Run container using
        default: librechat-singularity
        hidden: true
        tooltip: Select which container runtime will be used to launch the LibreChat containers (e.g., Docker or Singularity).
        options:
          - label: Docker
            value: librechat-docker
          - label: Singularity
            value: librechat-singularity
      cluster:
        hidden: ${{ inputs.resource.schedulerType == '' }}
        ignore: ${{ inputs.resource.schedulerType == '' }}
        type: group
        label: Compute Cluster Settings
        items:
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM enabled? Yes, unless the slurm section is hidden and ignored
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.resource }}
                tooltip: '--qos=partition slurm directive'
              time:
                label: Walltime
                type: string
                default: '01:00:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
                default: |
                  ##SBATCH --gres=gpu:4 # uncomment for gpus on onprem systems
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1
      service:
        type: group
        label: LibreChat Settings
        collapsed: true
        items:
          librechat_dir:
            type: string
            label: LibreChat directory
            default: ${HOME}/pw/LibreChat
            tooltip: Path where the LibreChat repository is cloned. Defaults to a shared location so chat history and uploads persist across sessions.
          librechat_config:
            type: string
            label: LibreChat config file
            optional: true
            tooltip: Path to the LibreChat YAML configuration file. Defaults to the standard location inside the LibreChat directory.
          librechat_db:
            type: string
            label: LibreChat Database Directory
            optional: true
            tooltip: Path to the directory where MongoDB stores its data. Defaults to the standard location inside the LibreChat directory.
          domain_client:
            type: dropdown
            label: Domain Client
            default: ACTIVATE
            tooltip: Select ACTIVATE if LibreChat will be accessed from the Activate platform, or LOCALHOST otherwise (e.g., accessed via localhost or through an SSH tunnel).
            options:
              - label: ACTIVATE
                value: ACTIVATE
              - label: LOCALHOST
                value: LOCALHOST
      env_vars:
        type: group
        label: Environment Variables
        collapsed: true
        items:
          JWT_SECRET:
            type: password
            label: JWT Secret
            default: ''
          JWT_REFRESH_SECRET:
            type: password
            label: JWT Refresh Secret
            default: ''
          LIBRECHAT_API_KEY:
            type: password
            label: LibreChat API Key
            default: ''
          LANGFLOW_API_KEY:
            type: password
            label: Langflow API Key
            default: ''
