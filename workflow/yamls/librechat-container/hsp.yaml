# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
---
# LibreChat Container for HSP
# HSP cluster configuration with FIPS-aware Singularity runtime
permissions:
  - '*'

env:
  PW_API_KEY: ${PW_API_KEY}
  GENAI_MIL_API_KEY: ${{ inputs.env.GENAI_MIL_API_KEY }}
  JWT_SECRET: ${{ inputs.env.JWT_SECRET }}
  JWT_REFRESH_SECRET: ${{ inputs.env.JWT_REFRESH_SECRET }}
  LIBRECHAT_API_KEY: ${{ inputs.env.LIBRECHAT_API_KEY }}
  LANGFLOW_API_KEY: ${{ inputs.env.LANGFLOW_API_KEY }}

sessions:
  session:
    redirect: true
jobs:
  preprocessing:
      ssh:
        remoteHost: ${{ inputs.resource.ip }}
      steps:
        - name: Checkout ${{ inputs.container_runtime }}
          uses: parallelworks/checkout
          with:
            repo: https://github.com/parallelworks/interactive_session.git
            branch: main
            sparse_checkout:
              - ${{ inputs.container_runtime }}
              - tools/oras
        - name: Create Inputs
          run: |
            set -x
            if [ -z "${PW_PLATFORM_HOST}" ]; then
              PW_PLATFORM_HOST=activate.hpc.mil
            fi
            PW_PLATFORM_HOST="${PW_PLATFORM_HOST#https://}"
            # Write PW variables
            env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
            # Encase values between quotes
            sed -i 's/=\(.*\)/="\1"/' inputs.sh
            # Password
            password=$(openssl rand -base64 12 | head -c 12)
            # basepath
            basepath=/me/session/${PW_USER}/${{ sessions.session }}
            # Write input form variables and ensure the pw agent is in the PATH
            cat <<'EOF' >> inputs.sh
            PATH=$HOME/pw:$PATH
            librechat_dir="${{ inputs.service.librechat_dir }}"
            domain_client="${{ inputs.service.domain_client }}"
            librechat_db="${{ inputs.service.librechat_db }}"
            librechat_config="${{ inputs.service.librechat_config }}"
            EOF
            echo basepath=${basepath} >> inputs.sh
            echo password=${password} >> inputs.sh
            if ! [ -z "${{ org.JUICE_TOKEN }}" ]; then
              echo "JUICE_TOKEN=${{ org.JUICE_TOKEN }}" >> inputs.sh
            fi
            # Remove empty variables
            sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
            sed -i '/=""/d' inputs.sh # remove var=""
            # Add export= to all lines
            sed -i 's/^/export /' inputs.sh

  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/hsp.yaml
          session: ${{ sessions.session }}
          resource: ${{ inputs.resource }}
          cluster:
            scheduler: ${{ inputs.cluster.scheduler }}
            slurm:
              is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
              account: ${{ inputs.cluster.slurm.account }}
              partition: ${{ inputs.cluster.slurm.partition }}
              qos: ${{ inputs.cluster.slurm.qos }}
              cpus_per_task: ${{ inputs.cluster.slurm.cpus_per_task }}
              nodes: ${{ inputs.cluster.slurm.nodes }}
              gpus: ${{ inputs.cluster.slurm.gpus }}
              scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
              time: ${{ inputs.cluster.slurm.time }}
            pbs:
              is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
              account: ${{ inputs.cluster.pbs.account }}
              scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/${{ inputs.container_runtime }}/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/${{ inputs.container_runtime }}/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/inputs.sh
            slug: login
            rundir: ${PW_PARENT_JOB_DIR}
        cleanup: |
          set -x
          if [ -d tools/oras ]; then
            echo "Removing tools/oras"
            rm -rf tools/oras
          fi

'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: Service host
        include-workspace: false
        tooltip: Resource to host the service
      container_runtime:
        type: dropdown
        label: Run container using
        default: librechat-singularity
        hidden: true
        tooltip: Select which container runtime will be used to launch the LibreChat containers (e.g., Docker or Singularity).
        options:
          - label: Docker
            value: librechat-docker
          - label: Singularity
            value: librechat-singularity
      cluster:
        hidden: ${{ inputs.resource.schedulerType == '' }}
        ignore: ${{ inputs.resource.schedulerType == '' }}
        type: group
        label: Compute Cluster Settings
        items:
          scheduler:
            type: boolean
            default: false
            label: Schedule Job?
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM enabled? Yes, unless the slurm section is hidden and ignored
              account:
                label: SLURM account
                type: slurm-accounts
                resource: ${{ inputs.resource }}
                tooltip: '--account=value slurm directive'
                ignore: ${{ 'existing' != inputs.resource.provider }}
                hidden: ${{ .ignore }}
              partition:
                type: slurm-partitions
                label: SLURM partition
                optional: true
                resource: ${{ inputs.resource }}
                tooltip: '--qos=partition slurm directive'
              qos:
                label: Quality of Service [QoS]
                type: slurm-qos
                resource: ${{ inputs.resource }}
                tooltip: '--qos=value slurm directive'
                ignore: ${{ 'existing' != inputs.resource.provider }}
                hidden: ${{ .ignore }}
              cpus_per_task:
                label: CPUs per task
                type: number
                default: 1
                tooltip: '--cpus-per-task= SLURM directive to set the number of CPUs per task'
                ignore: ${{ 'existing' != inputs.resource.provider }}
                hidden: ${{ .ignore }}
              nodes:
                label: Number of nodes
                type: number
                default: 1
                tooltip: '--nodes=value slurm directive'
                ignore: ${{ 'existing' != inputs.resource.provider }}
                hidden: ${{ .ignore }}
              gpus:
                label: Number of GPUs
                type: number
                default: 0
                tooltip: '--gres=gpu:value slurm directive'
                ignore: ${{ 'existing' != inputs.resource.provider }}
                hidden: ${{ .ignore }}
              time:
                label: Walltime
                type: string
                default: '00:30:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job (format: D-HH:MM:SS or HH:MM:SS, e.g. 7-00:00:00 or 01:00:00)'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
                default: |
                  ##SBATCH --constraint=mla # uncomment for Navy and AFRL DSRC systems
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              account:
                label: Account
                type: string
                tooltip: PBS account for job submission (-A)
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1
                default: |
                  # Parameters that apply to all sites
                  #PBS -l walltime=00:30:00
                  #PBS -V
                  #PBS -q standard
                  # Remove first # to activate specific lines
                  #=====Ruth (Lustre, only vis has NVIDIA)=====
                  ##PBS -l select=1:ncpus=128:mpiprocs=128:ngpus=1
                  #=====Warhawk (Lustre)====
                  ##PBS -l select=1:ncpus=128:mpiprocs=128:ngpus=2
                  #=====Wheat (WEKA, nmlas=4|6)====
                  ##PBS -l select=1:ncpus=92:mpiprocs=92:nmlas=4
      service:
        type: group
        label: LibreChat Settings
        collapsed: true
        items:
          librechat_dir:
            type: string
            label: LibreChat directory
            default: ${HOME}/pw/LibreChat
            tooltip: Path where the LibreChat repository is cloned. Defaults to a shared location so chat history and uploads persist across sessions.
          librechat_config:
            type: string
            label: LibreChat config file
            optional: true
            tooltip: Path to the LibreChat YAML configuration file. Defaults to the standard location inside the LibreChat directory.
          librechat_db:
            type: string
            label: LibreChat Database Directory
            optional: true
            tooltip: Path to the directory where MongoDB stores its data. Defaults to the standard location inside the LibreChat directory.
          domain_client:
            type: dropdown
            label: Domain Client
            default: ACTIVATE
            tooltip: Select ACTIVATE if LibreChat will be accessed from the Activate platform, or LOCALHOST otherwise (e.g., accessed via localhost or through an SSH tunnel).
            options:
              - label: ACTIVATE
                value: ACTIVATE
              - label: LOCALHOST
                value: LOCALHOST
      env:
        type: group
        label: Environment Variables
        collapsed: true
        items:
          GENAI_MIL_API_KEY:
            type: password
            label: GENAI MIL API Key
            default: ''
          JWT_SECRET:
            type: password
            label: JWT Secret
            default: ''
          JWT_REFRESH_SECRET:
            type: password
            label: JWT Refresh Secret
            default: ''
          LIBRECHAT_API_KEY:
            type: password
            label: LibreChat API Key
            default: ''
          LANGFLOW_API_KEY:
            type: password
            label: Langflow API Key
            default: ''
