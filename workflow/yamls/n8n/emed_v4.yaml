permissions:
  - '*'
sessions:
  session:
    useTLS: false
    redirect: true
jobs:
  preprocessing:
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Checkout ${{ inputs.service.container_runtime }}
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - ${{ inputs.service.container_runtime }}
      - name: Checkout Oras
        uses: parallelworks/checkout
        if: ${{ inputs.service.container_runtime == 'n8n-singularity' }}
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: main
          sparse_checkout:
            - tools/oras
      - name: Create Inputs
        run: |
          set -x
          # Write PW variables
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          # Encase values between quotes
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          # Write input form variables and ensure the pw agent is in the PATH
          cat <<'EOF' >> inputs.sh
          basepath="/me/session/${PW_USER}/${{ sessions.session }}/"
          PATH=$HOME/pw:$PATH
          n8n_image_tag="${{ inputs.service.n8n_image_tag }}"
          n8n_data_dir="${{ inputs.service.n8n_data_dir }}"
          service_parent_install_dir="${{ inputs.service.parent_install_dir }}"
          EOF

          # Remove empty variables
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh # remove var=""
          # Add export= to all lines
          sed -i 's/^/export /' inputs.sh
  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/emed.yaml
          session: ${{ sessions.session }}
          resource: ${{ inputs.cluster.resource }}
          cluster:
            scheduler: ${{ inputs.cluster.scheduler }}
            slurm:
              slurm_options: ${{ inputs.cluster.slurm.slurm_options }}
              is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
              partition_default: ${{ inputs.cluster.slurm.partition_default }}
              partition_hpc4: ${{ inputs.cluster.slurm.partition_hpc4 }}
              cpus_per_task: ${{ inputs.cluster.slurm.cpus_per_task }}
              mem: ${{ inputs.cluster.slurm.mem }}
              gres_gpu_default: ${{ inputs.cluster.slurm.gres_gpu_default }}
              gres_gpu_hpc4: ${{ inputs.cluster.slurm.gres_gpu_hpc4 }}
              time: ${{ inputs.cluster.slurm.time }}
              scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
            pbs:
              is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
              scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.container_runtime }}/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.container_runtime }}/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/inputs.sh
            slug: ''
            rundir: ${PW_PARENT_JOB_DIR}
        cleanup: |
          set -x
          rm -rf tools/oras

'on':
  execute:
    inputs:
      cluster:
        type: group
        label: Compute Cluster Settings
        items:
          resource:
            type: compute-clusters
            label: Service host
            include-workspace: false
            tooltip: Resource to host the service
            autoselect: true
          scheduler:
            type: boolean
            default: true
            label: Schedule Job?
            hidden: true
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'slurm' || inputs.cluster.scheduler == false }}
            items:
              slurm_options:
                type: dropdown
                label: Select Cluster
                optional: true
                default: ''
                options:
                  - value: ''
                    label: Default
                  - value: hpc4
                    label: HPC4
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
              partition_default:
                type: slurm-partitions
                label: SLURM partition
                ignore: ${{ 'hpc4' == inputs.cluster.slurm.slurm_options }}
                hidden: ${{ .ignore }}
                optional: true
                resource: ${{ inputs.cluster.resource }}
                tooltip: Select a partition from the drop down menu. Leave empty to let SLURM pick a partition.
              partition_hpc4:
                type: dropdown
                label: SLURM partition
                optional: true
                tooltip: Select a partition from the drop down menu. Leave empty to let SLURM pick a partition.
                ignore: ${{ 'hpc4' != inputs.cluster.slurm.slurm_options }}
                hidden: ${{ .ignore }}
                default: normal
                options:
                  - normal
                  - gpu
                  - gpu-h200
                  - gpu-quick
                  - ht
                  - large-mem
                  - quick
                  - test
                  - test-cpu
                  - test-gpu
                  - unlimited
              cpus_per_task:
                type: number
                label: CPUs per task
                min: 1
                max: 32
                default: 1
                tooltip: '--cpus-per-task=value slurm directive'
                ignore: ${{ 'existing' != inputs.cluster.resource.provider }}
                hidden: ${{ .ignore }}
              mem:
                type: dropdown
                label: Minimum total memory required
                default: 8GB
                tooltip: '--mem=value slurm directive'
                hidden: ${{ 'existing' != inputs.cluster.resource.provider }}
                ignore: ${{ .hidden }}
                options:
                  - 8GB
                  - 16GB
                  - 32GB
                  - 64GB
                  - 128GB
                  - 256GB
                  - 512GB
              gres_gpu_default:
                type: number
                label: Number of GPUs
                ignore: ${{ ( inputs.cluster.slurm.partition_default != 'gpu' && inputs.cluster.slurm.partition_default != 'gpu-quick' ) || 'existing' != inputs.cluster.resource.provider }}
                hidden: ${{ .ignore }}
                min: 1
                max: 4
                default: 1
                tooltip: '--gres=gpu:X slurm directive'
              gres_gpu_hpc4:
                type: number
                label: Number of GPUs
                hidden: ${{ ( inputs.cluster.slurm.partition_hpc4 != 'gpu' && inputs.cluster.slurm.partition_hpc4 != 'gpu-quick' && inputs.cluster.slurm.partition_hpc4 != 'gpu-h200' ) || 'existing' != inputs.cluster.resource.provider }}
                ignore: ${{ .hidden }}
                optional: ${{ .hidden }}
                min: 1
                max: 4
                default: 1
                tooltip: '--gres=gpu:X slurm directive'
              time:
                label: Walltime
                type: string
                default: '01:00:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1
      service:
        type: group
        label: n8n Settings
        items:
          parent_install_dir:
            type: string
            hidden: true
            default: /public/codelab/singularity
          container_runtime:
            type: string
            hidden: true
            default: n8n-singularity
          n8n_image_tag:
            label: n8n Image Tag
            type: string
            default: 1.123.4
            tooltip: n8n Docker image version tag (e.g. 1.123.4 or latest)
          n8n_data_dir:
            label: n8n Data Directory
            type: string
            default: ${HOME}/pw/n8n
            tooltip: Directory where n8n stores its data (workflows, credentials). Persists between sessions if on a shared filesystem.
