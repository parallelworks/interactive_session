# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
permissions:
  - '*'

jobs:
  preprocessing:
      ssh:
        remoteHost: ${{ inputs.cluster.resource.ip }}
      steps:
        - name: Checkout
          uses: parallelworks/checkout
          with:
            repo: https://github.com/parallelworks/interactive_session.git
            branch: main
            sparse_checkout:
              - ${{ inputs.service.name }}
        - name: Create Inputs
          run: |
            set -x
            # Write PW variables
            env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
            # Encase values between quotes
            sed -i 's/=\(.*\)/="\1"/' inputs.sh
            # Write input form variables and ensure the pw agent is in the PATH
            cat <<'EOF' >> inputs.sh
            PATH=$HOME/pw:$PATH
            service_download_url="${{ inputs.service.download_url }}"
            service_password="${{ inputs.service.password }}"
            service_directory="${{ inputs.service.directory }}"
            pw_endpoints_args="--name ${{ inputs.service.name }}-${PW_JOB_ID} --slug ?folder=${{ inputs.service.directory }}"
            EOF
            # Remove empty variables
            sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
            sed -i '/=""/d' inputs.sh # remove var=""
            # Add export= to all lines
            sed -i 's/^/export /' inputs.sh
        - name: Controller Preprocessing
          run: |
            set -x
            # This script prepares the target host and always runs in the controller node
            cp inputs.sh controller-${PW_JOB_ID}.sh
            cat ${{ inputs.service.name }}/controller-v4.sh >> controller-${PW_JOB_ID}.sh
            bash controller-${PW_JOB_ID}.sh
        - name: Create Service Script
          run: |
            rm -f HOSTNAME SESSION_PORT job.ended job.started
            # This script starts the service
            cp inputs.sh start-service-${PW_JOB_ID}.sh

            # Write code common to all services
            cat <<'EOF' >> start-service-${PW_JOB_ID}.sh

            cleanup() {
                trap - EXIT INT TERM HUP QUIT USR1 USR2 PIPE
                echo "::notice::Cleaning up..."
                if [ -f cancel.sh ]; then
                    mv cancel.sh cancel.sh.submitted
                    echo "echo Cleanup script was already executed" > cancel.sh
                    bash cancel.sh.submitted
                fi
                kill -- -$$
            }

            trap cleanup EXIT INT TERM HUP QUIT USR1 USR2 PIPE

            echo "::notice::Starting service"
            EOF
            cat ${{ inputs.service.name }}/start-template-v4.sh >> ./start-service-${PW_JOB_ID}.sh
            echo "SCRIPT_PATH=${PWD}/start-service-${PW_JOB_ID}.sh" | tee -a $OUTPUTS

  script_submitter:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.cluster.resource.ip }}
    steps:
      - name: Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/script_submitter/v3.6/emed.yaml
          resource: ${{ inputs.cluster.resource }}
          shebang: '#!/bin/bash'
          use_existing_script: true
          script_path: ${{ needs.preprocessing.outputs.SCRIPT_PATH }}
          define_cleanup_script: true
          cleanup_script_path: ./cancel.sh
          scheduler: ${{ inputs.cluster.scheduler }}
          use_scheduler_agent: false
          submit_and_exit: true
          slurm:
            slurm_options: ${{ inputs.cluster.slurm.slurm_options }}
            is_enabled: ${{ inputs.cluster.slurm.is_enabled }}
            partition_default: ${{ inputs.cluster.slurm.partition_default }}
            partition_hpc4: ${{ inputs.cluster.slurm.partition_hpc4 }}
            cpus_per_task: ${{ inputs.cluster.slurm.cpus_per_task }}
            mem: ${{ inputs.cluster.slurm.mem }}
            gres_gpu_default: ${{ inputs.cluster.slurm.gres_gpu_default }}
            gres_gpu_hpc4: ${{ inputs.cluster.slurm.gres_gpu_hpc4 }}
            time: ${{ inputs.cluster.slurm.time }}
            scheduler_directives: ${{ inputs.cluster.slurm.scheduler_directives }}
          pbs:
            is_enabled: ${{ inputs.cluster.pbs.is_enabled }}
            scheduler_directives: ${{ inputs.cluster.pbs.scheduler_directives }}

'on':
  execute:
    inputs:
      cluster:
        type: group
        label: Compute Cluster Settings
        items:
          resource:
            type: compute-clusters
            label: Service host
            include-workspace: false
            tooltip: Resource to host the service
            autoselect: true
          scheduler:
            type: boolean
            default: true
            label: Schedule Job?
            hidden: true
            tooltip: |
              Yes → Job is submitted to the scheduler using sbatch, qsub, etc
              No  → Job is executed in the controller or login node instead
          slurm:
            type: group
            label: SLURM Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'slurm'  || inputs.cluster.scheduler == false  }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'slurm'  || inputs.cluster.scheduler == false  }}
            items:
              slurm_options:
                type: dropdown
                label: Select Cluster
                optional: true
                default: ''
                options:
                  - value: ''
                    label: Default
                  - value: 'hpc4'
                    label: HPC4
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is SLURM Enabled? Yes, unless the slurm section is hidden and ignored
              partition_default:
                type: slurm-partitions
                label: SLURM partition
                ignore: ${{ 'hpc4' == inputs.cluster.slurm.slurm_options }}
                hidden: ${{ .ignore }}
                optional: true
                resource: ${{ inputs.cluster.resource }}
                tooltip: Select a partition from the drop down menu. Leave empty to let SLURM pick a partition.
              partition_hpc4:
                type: dropdown
                label: SLURM partition
                optional: true
                tooltip: Select a partition from the drop down menu. Leave empty to let SLURM pick a partition.
                ignore: ${{ 'hpc4' != inputs.cluster.slurm.slurm_options }}
                hidden: ${{ .ignore }}
                default: normal
                options:
                  - normal
                  - gpu
                  - gpu-h200
                  - gpu-quick
                  - ht
                  - large-mem
                  - quick
                  - test
                  - test-rhel9
                  - unlimited
              cpus_per_task:
                type: number
                label: CPUs per task
                min: 1
                max: 32
                default: 1
                tooltip: '--cpus-per-task=value slurm directive'
                ignore: ${{ 'existing' != inputs.cluster.resource.provider }}
                hidden: ${{ .ignore }}
              mem:
                type: dropdown
                label: Minimum total memory required
                default: 8GB
                tooltip: '--mem=value slurm directive'
                hidden: ${{ 'existing' != inputs.cluster.resource.provider }}
                ignore: ${{ .hidden }}
                options:
                   - 8GB
                   - 16GB
                   - 32GB
                   - 64GB
                   - 128GB
                   - 256GB
                   - 512GB
              gres_gpu_default:
                type: number
                label: Number of GPUs
                ignore: ${{ ( inputs.cluster.slurm.partition_default != 'gpu' && inputs.cluster.slurm.partition_default != 'gpu-quick' ) || 'existing' != inputs.cluster.resource.provider  }}
                hidden: ${{ .ignore }}
                min: 1
                max: 4
                default: 1
                tooltip: '--gres=gpu:X slurm directive'
              gres_gpu_hpc4:
                type: number
                label: Number of GPUs
                hidden: ${{ ( inputs.cluster.slurm.partition_hpc4 != 'gpu' && inputs.cluster.slurm.partition_hpc4 != 'gpu-quick' && inputs.cluster.slurm.partition_hpc4 != 'gpu-h200' ) || 'existing' != inputs.cluster.resource.provider  }}
                ignore: ${{ .hidden }}
                optional: ${{ .hidden }}
                min: 1
                max: 4
                default: 1
                tooltip: '--gres=gpu:X slurm directive'
              time:
                label: Walltime
                type: string
                default: '01:00:00'
                tooltip: '--time= SLURM directive to set the maximum wall-clock time limit for the job'
              scheduler_directives:
                type: editor
                optional: true
                tooltip: |
                  Add extra SLURM directives, one per line, using the #SBATCH prefix. For example:
                  #SBATCH --exclusive
                  #SBATCH --nodelist=<node-name>
          pbs:
            type: group
            label: PBS Directives
            hidden: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            ignore: ${{ inputs.cluster.resource.schedulerType != 'pbs' || inputs.cluster.scheduler == false }}
            items:
              is_enabled:
                type: boolean
                hidden: true
                default: true
                label: Is PBS enabled? Yes, unless the pbs section is hidden and ignored
              scheduler_directives:
                label: Scheduler Directives
                type: editor
                tooltip: |
                  Add extra PBS directives, one per line, using the #PBS prefix. For example:
                  #PBS -l mem=16gb
                  #PBS -l ngpus=1

      service:
        type: group
        label: Service
        hidden: true
        items:
          name:
            type: string
            hidden: true
            default: openvscode
          download_url:
            label: Download URL
            type: string
            default: https://github.com/coder/code-server/releases/download/v4.105.1/code-server-4.105.1-linux-amd64.tar.gz
            tooltip: Downloads or uses the code-server server version specified in the URL
          password:
            label: Password for IDE session
            type: password
            optional: true
            tooltip: Enter password or leave blank for no password
          directory:
            label: Directory to open in VS Code
            type: string
            default: /gs/gsfs0/users/${USER}/pw/
            tooltip: Directory to open in VS code
          load_singularity:
            type: string
            label: Load Singularity
            default: "module load singularity"
            ignore: ${{ 'existing' != inputs.cluster.resource.provider }}