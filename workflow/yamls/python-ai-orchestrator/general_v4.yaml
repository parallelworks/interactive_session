# yaml-language-server: $schema=https://activate.parallel.works/workflow.schema.json
#
# Python AI ORCHESTRATOR -- one chat model that coordinates your per-cluster workers.
# Always runs on your workspace, so it can `pw ssh` to every worker cluster.
# It auto-discovers the running python-ai-worker sessions (`pw sessions ls`) -- no
# roster to configure. Launch it, then chat with it from the platform.
permissions:
  - '*'

sessions:
  python_ai_orchestrator:   # openAI -> registered as a model in the built-in chat
    openAI: true
    redirect: false

env:
  PW_API_KEY: ${PW_API_KEY}   # runtime brain credential, injected into every step

jobs:
  preprocessing:
    ssh:
      remoteHost: ${{ inputs.resource.ip }}   # workspace -> empty ip -> runs locally
    steps:
      - name: Checkout
        uses: parallelworks/checkout
        with:
          repo: https://github.com/parallelworks/interactive_session.git
          branch: python-ai-agent    # TODO: switch to main once the branch is merged
          sparse_checkout:
            - ${{ inputs.service.name }}
      - name: Create Inputs
        run: |
          set -x
          env | grep '^PW_' | grep -v 'PW_API_KEY' > inputs.sh
          sed -i 's/=\(.*\)/="\1"/' inputs.sh
          cat <<'EOF' >> inputs.sh
          PATH=$HOME/pw:$PATH
          service_name="${{ inputs.service.name }}"
          agent_role="orchestrator"
          service_model="${{ inputs.service.model }}"
          service_allocation="${{ inputs.service.allocation }}"
          PYAI_AGENT_PORT="${{ inputs.service.agent_port }}"
          PYAI_DISPATCH_TIMEOUT="${{ inputs.service.dispatch_timeout }}"
          EOF
          # Workers are auto-discovered at runtime via `pw sessions ls` -- no roster.
          # Brain key is the runtime PW_API_KEY -- intentionally NOT written to inputs.sh.
          sed -i '/=\s*$\|=undefined\s*$/d' inputs.sh
          sed -i '/=""/d' inputs.sh
          sed -i 's/^/export /' inputs.sh

  session_runner:
    needs:
      - preprocessing
    ssh:
      remoteHost: ${{ inputs.resource.ip }}
    steps:
      - name: Session Runner
        uses: github/parallelworks/interactive_session@main
        early-cancel: any-job-failed
        with:
          $yaml: workflow/session_runner/v1.4/general.yaml
          session: ${{ sessions.python_ai_orchestrator }}
          resource: ${{ inputs.resource }}
          cluster:                       # workspace has no scheduler -> all literals
            scheduler: false
            slurm:
              is_enabled: false
              partition: ""
              time: "01:00:00"
              scheduler_directives: ""
            pbs:
              is_enabled: false
              scheduler_directives: ""
          service:
            start_service_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.name }}/start-template-v3.sh
            controller_script: ${PW_PARENT_JOB_DIR}/${{ inputs.service.name }}/controller-v3.sh
            inputs_sh: ${PW_PARENT_JOB_DIR}/inputs.sh
            rundir: ${PW_PARENT_JOB_DIR}

'on':
  execute:
    inputs:
      resource:
        type: compute-clusters
        label: Orchestrator host
        hidden: true               # always the workspace
        default: workspace
        include-workspace: true
        tooltip: The orchestrator always runs on your workspace so it can reach every worker cluster.
      service:
        type: group
        label: Settings
        items:
          name:
            type: string
            hidden: true
            default: python-ai-agent
          model:
            label: Model
            type: string
            default: org:glm/glm-5.1
            tooltip: The LLM that powers the orchestrator. Must support tool calling. See `pw ai models ls`.
          allocation:
            label: AI allocation
            type: string
            default: Private LLM Group
            tooltip: Which allocation to bill model usage against (for org:* models).
          dispatch_timeout:
            label: Per-task timeout (seconds)
            type: integer
            default: 300
            tooltip: How long to wait for a worker to answer a delegated task.
          agent_port:
            label: Fallback worker port
            type: integer
            hidden: true
            default: 8717
